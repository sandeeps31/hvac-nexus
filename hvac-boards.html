<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="theme.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boards Schedule — HVAC Nexus</title>
<style>
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.topbar-left{display:flex;align-items:center;gap:10px}
.bcl{color:var(--text2);cursor:pointer}.bcl:hover{color:var(--accent)}
.bcs{color:var(--muted)}.bcc{color:var(--text);font-weight:500}
.btn{padding:6px 13px;border-radius:7px;border:none;cursor:pointer;font-size:12.5px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--accent);color:#080c12}.bp:hover{background:#33d4ff}
.bg{background:transparent;color:var(--text2);border:1px solid var(--border)}.bg:hover{color:var(--text);border-color:var(--muted)}
.bd{background:transparent;color:var(--danger);border:1px solid var(--danger)}.bd:hover{background:rgba(255,77,109,.1)}
.tstrip-outer{background:var(--surface);border-bottom:2px solid var(--border);position:sticky;top:52px;z-index:100;padding:6px 14px 0}
.tstrip{display:flex;align-items:flex-end;gap:2px}
.etab{display:inline-flex;align-items:center;gap:5px;padding:5px 14px 6px;border-radius:5px 5px 0 0;border:1px solid var(--border);border-bottom:none;background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .13s;white-space:nowrap;position:relative;bottom:-2px;user-select:none}
.etab:hover{background:var(--surface3);color:var(--text)}
.etab.active{background:var(--bg);border-color:var(--accent);color:var(--accent);font-weight:600;z-index:2}
.toolbar-stack{position:sticky;top:102px;z-index:90;background:var(--surface)}
.abar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;gap:8px}
.rev-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;min-height:52px}
.rev-pills{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rev-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.rev-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;border:1.5px solid var(--border);cursor:pointer;user-select:none;transition:all .13s}
.rev-pill:hover{opacity:.8}
.rev-pill.draft{border-color:var(--warn);color:var(--warn);background:rgba(255,184,48,.08)}
.rev-pill.published{border-color:var(--green);color:var(--green);background:rgba(0,229,160,.08)}
.rev-pill.active-rev{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
/* ── SIDEBAR STANDARD ── */
.sb{width:230px;position:fixed;top:0;left:0;bottom:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:300;transition:width .25s;overflow:hidden;overflow-x:hidden}
.sb.sm{width:52px}
.sb-top{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-brand{display:flex;align-items:center;gap:9px;overflow:hidden}.sb-icon{font-size:20px;flex-shrink:0}.sb-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--text);white-space:nowrap}
.sb-toggle{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}.sb-toggle:hover{color:var(--accent);border-color:var(--accent)}
.sb-proj-block{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}.sb-proj-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}.sb-proj-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sb-proj-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.sb-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0;scrollbar-width:thin}
.sb-nav::-webkit-scrollbar{width:4px}.sb-nav::-webkit-scrollbar-track{background:transparent}.sb-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--text2);font-size:13px;border-left:3px solid transparent;position:relative;overflow:hidden;text-decoration:none}.sb-item:hover{background:var(--surface2);color:var(--text)}.sb-item.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent)}
.sb-item-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}.sb-item-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1}
.sb-tooltip{position:fixed;background:var(--surface2);color:var(--text);font-size:12px;font-weight:500;padding:5px 10px;border-radius:6px;border:1px solid var(--border);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.sb-group{}.sb-group-hdr{display:flex;align-items:center;gap:8px;padding:7px 16px 4px;cursor:pointer;user-select:none;transition:background .13s}.sb-group-hdr:hover{background:var(--surface2)}
.sb-group-chev{font-size:10px;color:var(--muted);flex-shrink:0;width:10px}.sb-group-name{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.sb-group-items .sb-item{padding-left:28px}
.sb.sm .sb-name,.sb.sm .sb-proj-block,.sb.sm .sb-group-hdr,.sb.sm .sb-item-label,.sb.sm .sb-user-name{display:none}
.sb.sm .sb-group-items{display:block !important}.sb.sm .sb-item{padding:9px 14px;justify-content:center;border-left:none;overflow:visible}
.sb.sm .sb-top{padding:14px 12px 10px;justify-content:center}.sb.sm .sb-footer{justify-content:center}.sb.sm .sb-item-icon{width:auto}
.sb-footer{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px}.sb-user-name{font-size:12.5px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-resize-handle{position:absolute;top:0;right:-4px;width:8px;height:100%;cursor:col-resize;z-index:400;background:transparent}.sb-resize-handle:hover{background:rgba(0,200,255,.15)}
.main{margin-left:230px;transition:margin-left .25s}
/* ── END SIDEBAR ── */
/* Boards */
/* Flat-table board grouping */
.board-cell{background:var(--surface);vertical-align:middle !important;font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--accent);border-left:3px solid var(--accent) !important;padding:6px 10px !important;white-space:normal !important}
.board-cell .bc-loc{display:block;margin-top:3px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;color:var(--text2)}
.board-cell .bc-actions{display:flex;gap:3px;margin-top:5px;justify-content:center}
.board-cell .bc-btn{width:22px;height:22px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:4px;font-size:11px;display:inline-flex;align-items:center;justify-content:center;padding:0;transition:all .12s}
.board-cell .bc-btn:hover{border-color:var(--accent);color:var(--accent)}
.board-cell .bc-btn.bc-del:hover{border-color:var(--danger);color:var(--danger);background:rgba(255,77,109,.1)}
.board-sep td{border-top:3px solid var(--bg) !important;padding:0 !important;height:4px !important;background:var(--bg) !important;border-left:none !important;border-right:none !important;border-bottom:none !important}
.btbl tr.board-alt td{background:rgba(255,255,255,.015)}
.btbl tr.board-alt td.board-cell{background:rgba(0,200,255,.03)}
.btbl tr.add-unit-row td{background:transparent !important;padding:3px 6px !important;border-top:none !important}
/* Table */
.sched-scroll{overflow-x:auto;padding:8px 16px 16px}
.btbl{width:100%;border-collapse:separate;border-spacing:0;table-layout:fixed}
.btbl th,.btbl td{box-sizing:border-box}
.btbl thead th{padding:9px 10px;text-align:center;font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:var(--surface2);border-bottom:2px solid var(--accent);border-right:1px solid var(--border);white-space:nowrap}
.btbl thead th:last-child{border-right:none}
/* JS-positioned floating header clone — fixed to viewport, kept in sync with the real <thead> */
.sched-hdr-clone{position:fixed;z-index:75;background:var(--bg);overflow:hidden;display:none;pointer-events:none}
.sched-hdr-clone.active{display:block}
.sched-hdr-clone table{border-collapse:separate;border-spacing:0;table-layout:fixed;margin:0}
.sched-hdr-clone th{box-sizing:border-box;padding:9px 10px;text-align:center;font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:var(--surface2);border-bottom:2px solid var(--accent);border-right:1px solid var(--border);white-space:nowrap}
.sched-hdr-clone th:last-child{border-right:none}
.btbl td{padding:4px 6px;vertical-align:middle;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--bg)}
.btbl tr:hover td{background:rgba(255,255,255,.02)}
.btbl tr:hover td.board-cell{background:var(--surface)}
.btbl tr.board-alt:hover td.board-cell{background:rgba(0,200,255,.03)}
.btbl tr.totals-row td{background:var(--surface2) !important;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;border-top:2px solid var(--border)}
.btbl tr.totals-row td.fla-total{color:var(--green);font-size:12px}
.btbl tr.totals-row td.fla-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;text-align:right}
.ci{background:transparent;border:1px solid transparent;border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;width:100%;padding:3px 6px;transition:border-color .15s;text-align:center;box-sizing:border-box}
.ci:focus{border-color:var(--accent);background:var(--surface2)}
.ci.num{text-align:right;font-family:'DM Mono',monospace;font-size:12px}
select.ci{cursor:pointer}
.del-btn{width:24px;height:24px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:4px;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s;padding:0}
.del-btn:hover{background:rgba(255,77,109,.15);color:var(--danger)}
.add-unit-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:5px;border:1px dashed var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;transition:all .13s;font-family:'DM Sans',sans-serif}
.add-unit-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
/* View mode toggle */
.view-toggle{display:inline-flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface2)}
.vt-btn{background:transparent;border:none;color:var(--text2);padding:6px 14px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .12s;border-right:1px solid var(--border)}
.vt-btn:last-child{border-right:none}
.vt-btn:hover{color:var(--text);background:rgba(255,255,255,.03)}
.vt-btn.active{background:var(--accent);color:#0a0a0a;font-weight:600}
/* Track-changes toggle */
.tc-wrap{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text2);user-select:none}
.tc-wrap input{cursor:pointer}
/* Diff highlights */
.btbl tr.tr-added td{background:rgba(0,229,160,.10) !important}
.btbl tr.tr-added td.board-cell{border-left-color:var(--green) !important}
.btbl tr.tr-deleted td{background:rgba(255,77,109,.10) !important;color:var(--muted) !important;text-decoration:line-through;text-decoration-color:rgba(255,77,109,.6)}
.btbl tr.tr-deleted td.board-cell{border-left-color:var(--danger) !important;color:var(--muted) !important}
.btbl tr.tr-deleted .ci{text-decoration:line-through;color:var(--muted) !important}
.btbl td.cell-changed{background:rgba(255,184,48,.18) !important;outline:1px solid rgba(255,184,48,.45);outline-offset:-1px;position:relative}
.btbl td.cell-cleared{background:rgba(255,184,48,.10) !important;position:relative}
.cell-cleared-old{position:absolute;top:2px;left:6px;right:6px;font-size:10px;color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(255,77,109,.6);pointer-events:none;font-family:'DM Mono',monospace;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Print stylesheet for PDF export via window.print() */
@media print{
  body{background:#fff !important;color:#000 !important}
  .topbar,.sb,.tstrip-outer,.abar,.rev-bar,.del-btn,.add-unit-btn,.bc-actions,.add-unit-row{display:none !important}
  .mainwrap{margin-left:0 !important;padding:0 !important}
  .sched-scroll{padding:0 !important;overflow:visible !important}
  .btbl thead th{background:#e8e8e8 !important;color:#000 !important;border:1px solid #999 !important;font-size:8px !important;position:static !important;box-shadow:none !important}
  .btbl td{border:1px solid #999 !important;color:#000 !important;font-size:9px !important;padding:3px 4px !important}
  .btbl td.board-cell{background:#f5f5f5 !important;color:#000 !important;border-left:2px solid #000 !important}
  .btbl tr.totals-row td{background:#f0f0f0 !important;color:#000 !important;font-weight:700 !important}
  .btbl tr.totals-row td.fla-total{color:#006633 !important}
  .ci,.csel,select.ci{background:transparent !important;border:none !important;color:#000 !important;-webkit-appearance:none;appearance:none;font-size:9px !important}
  .board-sep td{background:#fff !important;border:none !important}
  /* Diff in print */
  .btbl tr.tr-added td{background:#e8f7ee !important}
  .btbl tr.tr-deleted td{background:#fde7eb !important;text-decoration:line-through}
  .btbl td.cell-changed{background:#fff5d9 !important;outline:1px solid #c89a2e !important}
}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;min-width:400px;max-width:520px;width:100%}
.modal h3{margin:0 0 16px;font-size:15px;font-weight:600}
.form-row{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-row label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.form-inp{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;outline:none;width:100%;box-sizing:border-box;transition:border-color .15s}
.form-inp:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.cedbtn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .13s}
.cedbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.placeholder-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;color:var(--muted);text-align:center}
.placeholder-tab h3{font-size:18px;color:var(--text2);margin:0}
</style>
<script src="db.js"></script>
</head>
<body>
<div id="app-sidebar"></div>
<script src="sidebar.js"></script>

<div class="main" id="mainWrap">
<div class="topbar">
  <div class="topbar-left">
    <span class="bcl" onclick="location.href='index.html'">Projects</span>
    <span class="bcs">›</span>
    <span class="bcl" onclick="location.href='project-dashboard.html'" id="tb-proj-name">—</span>
    <span class="bcs">›</span>
    <span class="bcc">Boards Schedule</span>
  </div>

</div>

<div class="tstrip-outer">
  <div class="tstrip" id="tabStrip"></div>
</div>

<div class="toolbar-stack" id="toolbarStack">
<div class="abar" id="abar">
  <!-- View mode toggle -->
  <div class="view-toggle" id="viewToggle">
    <button class="vt-btn active" id="vtList" onclick="setViewMode('list')">List View</button>
    <button class="vt-btn" id="vtGrouped" onclick="setViewMode('grouped')">Grouped View</button>
  </div>
  <!-- Track changes toggle (only when draft exists) -->
  <label class="tc-wrap" id="tcWrap" style="display:none;margin-left:10px">
    <input type="checkbox" id="tcChk" onchange="renderBoards()">
    <span>Track changes</span>
  </label>
  <div style="flex:1"></div>
  <button class="btn bg" id="btnTemplate" onclick="downloadTemplate()" style="color:var(--green);border-color:rgba(0,229,160,.3);display:none">⬇ Template</button>
  <button class="cedbtn" id="colSettingsBtn" onclick="openColSettings()">⚙ Columns</button>
  <button class="btn bg" id="btnImport" onclick="triggerImport()">⬆ Import</button>
  <button class="btn bg" onclick="exportXLSX()">⬇ Excel</button>
  <button class="btn bg" onclick="exportPDF()">⬇ PDF</button>
</div>

<!-- Revision bar: pills on the left, workflow buttons on the right -->
<div class="rev-bar" id="revBar" style="display:none">
  <div class="rev-pills" id="revPills"></div>
  <div style="flex:1"></div>
  <div class="rev-actions">
    <button class="btn bp" id="btnStartDraft" onclick="startDraft()" style="display:none">✏ Start New Draft</button>
    <button class="btn bp" id="btnEditDraft" onclick="editDraft()" style="display:none">✏ Edit Draft</button>
    <button class="btn bp" id="btnSave" onclick="saveDraft()" style="display:none">💾 Save</button>
    <button class="btn bg" id="btnPublish" onclick="publishRev()" style="display:none">↑ Publish Rev</button>
    <button class="btn bg" id="btnDiscard" onclick="discardDraft()" style="display:none;color:var(--danger);border-color:rgba(255,77,109,.3)">🗑 Discard Draft</button>
    <button class="btn bg" id="btnExportDraft" onclick="doExportDraft()" style="display:none">Export Draft</button>
  </div>
</div>
</div><!-- end toolbar-stack -->

<div id="mainContent"></div>
</div><!-- end mainWrap -->

<!-- Board Modal -->
<div class="modal-overlay" id="boardModal">
  <div class="modal">
    <h3 id="boardModalTitle">Add Board</h3>
    <div class="form-row">
      <label>Board ID *</label>
      <input class="form-inp" id="bm-ref" placeholder="e.g. MSSB-L00-0001A">
    </div>
    <div class="form-row">
      <label>Board Location</label>
      <input class="form-inp" id="bm-loc" placeholder="e.g. GIS 1">
    </div>
    <div class="modal-btns">
      <button class="btn bg" onclick="closeBoardModal()">Cancel</button>
      <button class="btn bp" onclick="saveBoardModal()">Save</button>
    </div>
  </div>
</div>

<!-- Column Settings Modal -->
<div class="modal-overlay" id="colModal">
  <div class="modal" style="min-width:340px;max-width:420px">
    <h3>Column Settings</h3>
    <p style="font-size:12px;color:var(--muted);margin:0 0 14px">Toggle columns on/off</p>
    <div id="colList" style="display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto"></div>
    <div class="modal-btns">
      <button class="btn bg" onclick="resetCols()">Reset All</button>
      <button class="btn bp" onclick="closeColSettings()">Done</button>
    </div>
  </div>
</div>

<input type="file" id="importFile" accept=".xlsx" style="display:none" onchange="handleImport(event)">

<script>
function applySB(c){var sb=document.getElementById('sidebar');var main=document.getElementById('mainWrap')||document.querySelector('.main');var btn=document.getElementById('sbToggleBtn');if(sb)sb.classList.toggle('sm',c);if(main)main.style.marginLeft=c?'52px':'';if(btn)btn.textContent=c?'»':'«';}

// ── Column visibility ──
var _colVis={};
function getVisibleCols(){return COLS.filter(function(c){return _colVis[c.k]!==false;});}
function openColSettings(){
  var list=document.getElementById('colList');
  list.innerHTML=COLS.map(function(c){
    var checked=_colVis[c.k]!==false;
    return '<label style="display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer;border-bottom:1px solid var(--border)">'
      +'<input type="checkbox"'+(checked?' checked':'')+' onchange="toggleCol(\''+c.k+'\',this.checked)" style="accent-color:var(--accent);width:15px;height:15px">'
      +'<span style="font-size:13px">'+X(c.l)+'</span></label>';
  }).join('');
  document.getElementById('colModal').classList.add('open');
}
function toggleCol(key,visible){_colVis[key]=visible;renderBoards();saveBoards();}
function resetCols(){_colVis={};openColSettings();renderBoards();saveBoards();}
function closeColSettings(){document.getElementById('colModal').classList.remove('open');}
function hasAnyData(){
  return _boards.some(function(b){
    return (b.units||[]).some(function(u){
      return COLS.some(function(c){return c.k!=='unitNum'&&String(u[c.k]||'').trim()!=='';});
    });
  });
}
function updateTemplateBtnVisibility(){
  var btn=document.getElementById('btnTemplate');if(!btn)return;

// ── Track-changes diff ──
// Builds a flat unit map keyed by board.id+unit.id, with denormalised board fields
function flattenBoards(bds){
  var out={};
  (bds||[]).forEach(function(b){
    (b.units||[]).forEach(function(u){
      out[b.id+'::'+u.id]={boardId:b.id,unitId:u.id,boardRef:b.ref||'',boardLoc:b.loc||'',
        unitNum:u.unitNum||'',unitDesc:u.unitDesc||'',suppFrom:u.suppFrom||'',suppLoc:u.suppLoc||'',
        duty:u.duty||'',starter:u.starter||'',lamps:u.lamps||'',power:u.power||'',
        ph1:u.ph1||'',ph2:u.ph2||'',ph3:u.ph3||'',meterRef:u.meterRef||'',ctrlSw:u.ctrlSw||''};
    });
  });
  return out;
}
// Returns {addedKeys:Set, deletedKeys:Set, deletedRows:[{key,row}], changed:{key:{col:[old,new]}}, boardChanges:{boardId:{ref?:[],loc?:[]}}}
function computeBoardsDiff(baseBoards,curBoards){
  var baseFlat=flattenBoards(baseBoards);
  var curFlat=flattenBoards(curBoards);
  var added={},deleted={},changed={},boardChanges={};
  Object.keys(curFlat).forEach(function(k){if(!baseFlat[k])added[k]=true;});
  Object.keys(baseFlat).forEach(function(k){if(!curFlat[k])deleted[k]=baseFlat[k];});
  // Board-level changes (ref/loc) for boards present in both
  var baseBoardMap={};(baseBoards||[]).forEach(function(b){baseBoardMap[b.id]=b;});
  (curBoards||[]).forEach(function(b){
    var bb=baseBoardMap[b.id];
    if(!bb)return;
    var bc={};
    if((bb.ref||'')!==(b.ref||''))bc.ref=[bb.ref||'',b.ref||''];
    if((bb.loc||'')!==(b.loc||''))bc.loc=[bb.loc||'',b.loc||''];
    if(Object.keys(bc).length)boardChanges[b.id]=bc;
  });
  // Unit-level cell changes
  var unitCols=['unitNum','unitDesc','suppFrom','suppLoc','duty','starter','lamps','power','ph1','ph2','ph3','meterRef','ctrlSw'];
  Object.keys(curFlat).forEach(function(k){
    var b=baseFlat[k],c=curFlat[k];if(!b)return;
    var diffs={};
    unitCols.forEach(function(col){
      var ov=String(b[col]||'').trim(),nv=String(c[col]||'').trim();
      if(ov!==nv)diffs[col]=[b[col]||'',c[col]||''];
    });
    if(Object.keys(diffs).length)changed[k]=diffs;
  });
  return{added:added,deleted:deleted,changed:changed,boardChanges:boardChanges};
}
// Decide which baseline to diff against given current view state
function getDiffBaseline(){
  var revs=_revData.mssb||[];
  if(_viewRevIdx!==null&&_viewRevIdx>=0){
    // Viewing a published rev — compare against previous rev (or empty if rev 0)
    if(_viewRevIdx===0)return null;
    return revs[_viewRevIdx-1].boards||[];
  }
  // Live or draft — compare against last published
  if(!revs.length)return null;
  return revs[revs.length-1].boards||[];
}
function shouldShowDiff(){
  var chk=document.getElementById('tcChk');
  if(!chk||!chk.checked)return false;
  return getDiffBaseline()!==null;
}

function renderRevBar(){
  var revs=_revData.mssb||[];

  var rb=document.getElementById('revBar');
  var rp=document.getElementById('revPills');
  // Button visibility based on state machine:

  //   - has draft, NOT in edit mode → show "Edit Draft", "Publish", "Discard"
  //   - has draft, IN edit mode → show "Save", "Publish", "Discard"
  var viewingPub=_viewRevIdx!==null&&_viewRevIdx>=0;
  var setBtn=function(id,show){var el=document.getElementById(id);if(el)el.style.display=show?'inline-flex':'none';};
  if(viewingPub){
    setBtn('btnStartDraft',false);setBtn('btnEditDraft',false);setBtn('btnSave',false);
    setBtn('btnPublish',false);setBtn('btnDiscard',false);setBtn('btnExportDraft',false);
  } else if(!hasDraft){
    setBtn('btnStartDraft',true);setBtn('btnEditDraft',false);setBtn('btnSave',false);
    setBtn('btnPublish',false);setBtn('btnDiscard',false);setBtn('btnExportDraft',false);
  } else if(_editing){
    setBtn('btnStartDraft',false);setBtn('btnEditDraft',false);setBtn('btnSave',true);
    setBtn('btnPublish',true);setBtn('btnDiscard',true);setBtn('btnExportDraft',true);
  } else {
    setBtn('btnStartDraft',false);setBtn('btnEditDraft',true);setBtn('btnSave',false);
    setBtn('btnPublish',true);setBtn('btnDiscard',true);setBtn('btnExportDraft',true);
  }
  // Track-changes toggle: show when there's at least one revision to compare against
  var tcw=document.getElementById('tcWrap');
  if(tcw)tcw.style.display=revs.length?'inline-flex':'none';

  // Build pills HTML (left side)
  var html='';

    html+='<div class="rev-pill draft'+(_viewRevIdx===-1?' active-rev':'')+'" onclick="viewRev(-1)">'+nextRevLabel+'</div>';

  });
  rp.innerHTML=html||'<span style="font-size:12px;color:var(--muted)">No revisions yet — click <strong>✏ Start New Draft</strong></span>';
  // Always show the rev-bar so the workflow buttons stay reachable
  rb.style.display='flex';
}

function viewRev(idx){
  _viewRevIdx=idx;
  renderRevBar();

    // null = live, -1 = draft (which IS the live state — editable)
    _viewRevIdx=(idx===-1)?-1:null;
    renderBoards();

  }

// True when the user is actively editing an open draft. Determines whether the
// table renders editable inputs or read-only spans.
function isEditable(){
  return _editing && _viewRevIdx===null;
}

// ── Draft lifecycle ──
// Start a brand new draft from the last published revision (or empty state).
// Does NOT enter edit mode automatically — same flow as Start New Draft + Edit Draft separately.
function startDraft(){
  if(_revData.mssb_draft){alert('A draft already exists. Click Edit Draft to continue.');return;}
  _revData.mssb_draft=true;
  _editing=true;
  _viewRevIdx=null;
  saveBoards();
  renderRevBar();
  renderBoards();
  if(typeof showToast==='function')showToast('✏ Draft started — table is now editable');
}

// Re-enter edit mode for an existing draft.
function editDraft(){
  if(!_revData.mssb_draft){startDraft();return;}
  _editing=true;
  _viewRevIdx=null;
  renderRevBar();
  renderBoards();
}

// Exit edit mode. Data is auto-saved on every change so this is essentially "lock the table".
function saveDraft(){
  _editing=false;
  // Latest writes are already in Supabase via auto-save in updUnit / addUnit / etc.
  saveBoards();
  renderRevBar();
  renderBoards();
  if(typeof showToast==='function')showToast('💾 Saved');
}

function publishRev(){
  var revs=_revData.mssb||[];
  var snap=JSON.parse(JSON.stringify(_boards));
  revs.push({rev:'Rev '+String(revs.length+1).padStart(2,'0'),date:todayStr(),boards:snap});
  _revData.mssb=revs;
  delete _revData.mssb_draft;
  _editing=false;
  _viewRevIdx=null;
  saveBoards();
  renderRevBar();
  renderBoards();
}

function discardDraft(){
  if(!_revData.mssb_draft){return;}
  var revs=_revData.mssb||[];
  var msg=revs.length
    ? 'Discard draft?\n\nAll changes since the last published revision ('+revs[revs.length-1].rev+') will be permanently lost. This cannot be undone.'
    : 'Discard draft?\n\nThere is no published revision to fall back on — discarding will clear all boards. This cannot be undone.';
  if(!confirm(msg))return;
  if(revs.length){
    _boards=JSON.parse(JSON.stringify(revs[revs.length-1].boards||[]));
  } else {
    _boards=[];
  }
  delete _revData.mssb_draft;
  _editing=false;
  _viewRevIdx=null;
  saveBoards();
  renderRevBar();
  renderBoards();
  if(typeof showToast==='function')showToast('✓ Draft discarded — restored to '+(revs.length?revs[revs.length-1].rev:'empty state'));
}

function renderBoards(readonly,overrideBoards){
  var mc=document.getElementById('mainContent');
  var bds=overrideBoards||_boards;
  // If readonly not explicitly passed, derive from edit-mode state
  if(readonly===undefined||readonly===null){readonly=!isEditable();}
  var vcols=getVisibleCols();

  if(!bds||!bds.length){
    var emptyMsg;
    if(isEditable()){
      emptyMsg='<div>No data yet.</div><div style="margin-top:14px"><button class="add-unit-btn" onclick="addLineItem()" style="font-size:12px;padding:6px 14px">+ Add Line Item</button></div><div style="margin-top:10px;font-size:11px;color:var(--muted)">or <strong>⬆ Import</strong> from Excel</div>';
    } else if(_revData.mssb_draft){
      emptyMsg='<div>No data yet.</div><div style="margin-top:8px;font-size:12px">Click <strong>✏ Edit Draft</strong> above to add line items.</div>';
    } else {
      emptyMsg='<div>No data yet.</div><div style="margin-top:8px;font-size:12px">Click <strong>✏ Start New Draft</strong> above to begin.</div>';
    }
    mc.innerHTML='<div class="emptyp" style="text-align:center;padding:60px 20px;color:var(--muted)"><div style="font-size:40px;opacity:.3;margin-bottom:12px">⚡</div>'+emptyMsg+'</div>';
    return;
  }

  // Determine diff state — applies to both views
  var diff=null;
  if(shouldShowDiff()){
    var base=getDiffBaseline();
    if(base)diff=computeBoardsDiff(base,bds);
  }

  if(_viewMode==='list')renderListView(mc,bds,vcols,readonly,diff);
  else renderGroupedView(mc,bds,vcols,readonly,diff);

  // Adjust sticky column-header offset based on rev-bar visibility
  adjustStickyHdr();
  // Run again after the browser has flushed layout (handles cases where elements
  // haven't reflowed by the time we measure synchronously).
  requestAnimationFrame(adjustStickyHdr);
}

// JS-driven sticky header (CSS sticky is trapped by .sched-scroll's overflow-x:auto)
// Strategy: clone the real <thead> into a position:fixed element above the table, kept
// in sync with column widths and horizontal scroll. The clone shows when the real header
// scrolls past the toolbar stack and hides when the table's top edge is back in view.
var _hdrClone=null;
var _hdrSyncRAF=null;

function ensureHdrClone(){
  if(_hdrClone&&document.body.contains(_hdrClone))return _hdrClone;
  _hdrClone=document.createElement('div');
  _hdrClone.className='sched-hdr-clone';
  document.body.appendChild(_hdrClone);
  return _hdrClone;
}

function getStackedTopOffset(){
  var topbar=document.querySelector('.topbar');
  var tstrip=document.querySelector('.tstrip-outer');
  var stack=document.getElementById('toolbarStack');
  var stackedTop=0;
  [topbar,tstrip,stack].forEach(function(el){if(el&&el.offsetHeight)stackedTop+=el.offsetHeight;});
  return stackedTop;
}

function syncHdrClone(){
  var clone=ensureHdrClone();
  var realTbl=document.querySelector('.btbl');
  var realThead=realTbl&&realTbl.querySelector('thead');
  var scroll=document.querySelector('.sched-scroll');
  if(!realThead||!scroll){clone.classList.remove('active');return;}

  var stackedTop=getStackedTopOffset();
  var scrollRect=scroll.getBoundingClientRect();
  var theadRect=realThead.getBoundingClientRect();

  // Show the clone when the real thead has scrolled above the toolbar stack
  var shouldShow=theadRect.top<stackedTop&&scrollRect.bottom>stackedTop;
  if(!shouldShow){clone.classList.remove('active');return;}

  clone.style.top=stackedTop+'px';
  clone.style.left=scrollRect.left+'px';
  clone.style.width=scrollRect.width+'px';

  // Read column widths from the REAL header row's <th> cells (measured, not declared).
  // Falling back to 0 if a cell can't be measured.
  var realThs=realThead.querySelectorAll('th');
  var widths=[];
  var totalW=0;
  realThs.forEach(function(th){
    var w=th.getBoundingClientRect().width;
    widths.push(w);
    totalW+=w;
  });

  // Build clone: a fixed-width inner wrapper that scrolls horizontally with the real table
  var inner='<div style="position:relative;width:100%;height:100%;overflow:hidden">';
  inner+='<table style="margin-left:'+(-scroll.scrollLeft)+'px;width:'+totalW+'px;table-layout:fixed;border-collapse:separate;border-spacing:0"><colgroup>';
  widths.forEach(function(w){inner+='<col style="width:'+w+'px">';});
  inner+='</colgroup><thead><tr>';
  realThs.forEach(function(th){inner+='<th>'+th.innerHTML+'</th>';});
  inner+='</tr></thead></table></div>';
  clone.innerHTML=inner;
  clone.classList.add('active');
}

function scheduleHdrSync(){
  if(_hdrSyncRAF)return;
  _hdrSyncRAF=requestAnimationFrame(function(){_hdrSyncRAF=null;syncHdrClone();});
}

// Bind global listeners once
(function bindHdrListeners(){
  if(window._hdrListenersBound)return;
  window._hdrListenersBound=true;
  window.addEventListener('scroll',scheduleHdrSync,{passive:true});
  window.addEventListener('resize',scheduleHdrSync,{passive:true});
  // Catch horizontal scroll on the table wrapper too
  document.addEventListener('scroll',function(e){
    if(e.target&&e.target.classList&&e.target.classList.contains('sched-scroll')){
      scheduleHdrSync();
    }
  },true);
})();

// Backwards-compat shim — older code calls adjustStickyHdr() after render
function adjustStickyHdr(){scheduleHdrSync();}

// Helper — render an editable cell for a unit, applying cell-changed highlight if applicable
function renderUnitCell(c,unit,boardId,readonly,diffEntry){
  var val=unit[c.k]||'';
  var changed=diffEntry&&diffEntry[c.k];
  var cellCls='';
  var clearedOverlay='';
  if(changed){
    var oldV=changed[0]||'',newV=changed[1]||'';
    if(newV===''&&oldV!==''){
      cellCls=' class="cell-cleared"';
      clearedOverlay='<span class="cell-cleared-old">'+X(oldV)+'</span>';
    } else {
      cellCls=' class="cell-changed"';
    }
  }
  var inner;
  if(readonly){
    inner='<span style="font-size:12px;padding:2px 6px;display:block">'+X(val)+'</span>';
  } else if(c.sel){
    inner='<select class="ci" onchange="updUnit(\''+boardId+'\',\''+unit.id+'\',\''+c.k+'\',this.value)">';
    inner+='<option value="">—</option>';
    c.sel.forEach(function(o){inner+='<option value="'+X(o)+'"'+(o===val?' selected':'')+'>'+X(o)+'</option>';});
    inner+='</select>';
  } else {
    inner='<input class="ci'+(c.num?' num':'')+'" type="'+(c.num?'number':'text')+'" value="'+X(val)+'"'+(c.num?' min="0" step="0.1"':'')+' onchange="updUnit(\''+boardId+'\',\''+unit.id+'\',\''+c.k+'\',this.value)">';
  }
  return '<td'+cellCls+'>'+clearedOverlay+inner+'</td>';
}

// ── List View — flat, one row per unit (matches Excel template) ──
function renderListView(mc,bds,vcols,readonly,diff){
  var BOARD_W='180px',LOC_W='130px';
  var colgroupHtml='<colgroup>';
  colgroupHtml+='<col style="width:'+BOARD_W+'">';
  colgroupHtml+='<col style="width:'+LOC_W+'">';
  vcols.forEach(function(c){colgroupHtml+='<col style="width:'+c.w+'">';});
  if(!readonly)colgroupHtml+='<col style="width:36px">';
  colgroupHtml+='</colgroup>';

  var html='<div class="sched-scroll"><table class="btbl">'+colgroupHtml;
  // Sticky header — inside the same table so columns ALWAYS align
  html+='<thead><tr>';
  html+='<th>Board ID</th><th>Board Location</th>';
  vcols.forEach(function(c){html+='<th>'+X(c.l)+'</th>';});
  if(!readonly)html+='<th></th>';
  html+='</tr></thead>';
  html+='<tbody>';

  var dataColSpan=vcols.length+(readonly?0:1);
  var totalCols=2+vcols.length+(readonly?0:1);

  bds.forEach(function(board){
    var units=board.units||[];
    var bChange=(diff&&diff.boardChanges&&diff.boardChanges[board.id])||null;
    var refCellCls=bChange&&bChange.ref?' class="cell-changed"':'';
    var locCellCls=bChange&&bChange.loc?' class="cell-changed"':'';
    var refOv=bChange&&bChange.ref&&bChange.ref[0]?'<span class="cell-cleared-old" style="position:static;display:block;font-size:9px;margin-bottom:2px">'+X(bChange.ref[0])+'</span>':'';
    var locOv=bChange&&bChange.loc&&bChange.loc[0]?'<span class="cell-cleared-old" style="position:static;display:block;font-size:9px;margin-bottom:2px">'+X(bChange.loc[0])+'</span>':'';

    // Board ID + Location cells. First row of each board is editable (when in edit mode);
    // subsequent rows show read-only displays so the user doesn't get 3 inputs to update one value.
    function refCellHtml(isFirstOfBoard){
      if(readonly||!isFirstOfBoard){
        return '<td'+refCellCls+' style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--accent);font-weight:600"><span data-board-ref-display="'+board.id+'">'+refOv+X(board.ref||'—')+'</span></td>';
      }
      return '<td'+refCellCls+' style="padding:2px 4px"><input class="ci" data-board-ref-id="'+board.id+'" value="'+X(board.ref||'')+'" placeholder="Board ID" style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--accent);font-weight:600;text-align:center" onchange="updBoardRef(\''+board.id+'\',this.value)"></td>';
    }
    function locCellHtml(isFirstOfBoard){
      if(readonly||!isFirstOfBoard){
        return '<td'+locCellCls+' style="font-size:11px;color:var(--text2)"><span data-board-loc-display="'+board.id+'">'+locOv+X(board.loc||'—')+'</span></td>';
      }
      return '<td'+locCellCls+' style="padding:2px 4px"><input class="ci" value="'+X(board.loc||'')+'" placeholder="e.g. Level 00 Plantroom" style="font-size:11px;color:var(--text2);text-align:center" onchange="updBoardLoc(\''+board.id+'\',this.value)"></td>';
    }

    if(units.length){
      units.forEach(function(unit,unitIdx){
        var key=board.id+'::'+unit.id;
        var rowCls='unit-row';
        if(diff){
          if(diff.added[key])rowCls+=' tr-added';
        }
        var diffEntry=diff?diff.changed[key]:null;
        html+='<tr id="ur_'+unit.id+'" class="'+rowCls+'" data-board="'+board.id+'">';
        html+=refCellHtml(unitIdx===0);
        html+=locCellHtml(unitIdx===0);
        vcols.forEach(function(c){html+=renderUnitCell(c,unit,board.id,readonly,diffEntry);});
        if(!readonly)html+='<td><button class="del-btn" onclick="deleteUnit(\''+board.id+'\',\''+unit.id+'\')">✕</button></td>';
        html+='</tr>';
      });
    } else {
      // Empty board placeholder
      html+='<tr class="unit-row" data-board="'+board.id+'">';
      html+=refCellHtml(true);
      html+=locCellHtml(true);
      html+='<td colspan="'+dataColSpan+'" style="padding:10px;text-align:center;color:var(--muted);font-size:11px;font-style:italic">No equipment'+(!readonly?' — <a href="#" onclick="event.preventDefault();addUnit(\''+board.id+'\')" style="color:var(--accent);text-decoration:none">+ Add Equipment</a>':'')+'</td>';
      html+='</tr>';
    }
  });

  // Render deleted rows (only if diffing)
  if(diff){
    Object.keys(diff.deleted).forEach(function(key){
      var d=diff.deleted[key];
      html+='<tr class="tr-deleted">';
      html+='<td style="font-family:\'DM Mono\',monospace;font-size:11px;font-weight:600">'+X(d.boardRef)+'</td>';
      html+='<td style="font-size:11px">'+X(d.boardLoc||'—')+'</td>';
      vcols.forEach(function(c){html+='<td style="font-size:12px;padding:4px 6px">'+X(d[c.k]||'')+'</td>';});
      if(!readonly)html+='<td></td>';
      html+='</tr>';
    });
  }

  // Footer — single + Add Line Item button (live edit mode only)
  if(!readonly&&_viewRevIdx===null){
    html+='<tr class="add-unit-row"><td colspan="'+totalCols+'" style="padding:10px 14px;text-align:left">';
    html+='<button class="add-unit-btn" onclick="addLineItem()">+ Add Line Item</button>';
    html+='</td></tr>';
  }

  html+='</tbody></table></div>';
  mc.innerHTML=html;
}

// ── Grouped View — original rowspan layout with totals row per board ──
function renderGroupedView(mc,bds,vcols,readonly,diff){
  var BOARD_W='160px',LOC_W='140px';
  var colgroupHtml='<colgroup>';
  colgroupHtml+='<col style="width:'+BOARD_W+'">';
  colgroupHtml+='<col style="width:'+LOC_W+'">';
  vcols.forEach(function(c){colgroupHtml+='<col style="width:'+c.w+'">';});
  if(!readonly)colgroupHtml+='<col style="width:36px">';
  colgroupHtml+='</colgroup>';

  var html='<div class="sched-scroll"><table class="btbl">'+colgroupHtml;
  // Sticky header — inside the same table so columns ALWAYS align
  html+='<thead><tr>';
  html+='<th>Board ID</th><th>Board Location</th>';
  vcols.forEach(function(c){html+='<th>'+X(c.l)+'</th>';});
  if(!readonly)html+='<th></th>';
  html+='</tr></thead>';
  html+='<tbody>';

  var dataColSpan=vcols.length+(readonly?0:1);

  bds.forEach(function(board,boardIdx){
    var units=board.units||[];
    var ph1=0,ph2=0,ph3=0;
    units.forEach(function(u){ph1+=fla(u.ph1);ph2+=fla(u.ph2);ph3+=fla(u.ph3);});

    if(boardIdx>0){
      html+='<tr class="board-sep"><td colspan="'+(2+dataColSpan)+'"></td></tr>';
    }

    var altClass=(boardIdx%2===1)?' board-alt':'';
    var unitRowCount=Math.max(units.length,1);
    var boardSpanRows=unitRowCount+1;

    var bChange=(diff&&diff.boardChanges&&diff.boardChanges[board.id])||null;
    var refOv=bChange&&bChange.ref&&bChange.ref[0]?'<span class="cell-cleared-old" style="position:static;display:block;font-size:9px;margin-bottom:2px">'+X(bChange.ref[0])+'</span>':'';
    var locOv=bChange&&bChange.loc&&bChange.loc[0]?'<span class="cell-cleared-old" style="position:static;display:block;font-size:9px;margin-bottom:2px">'+X(bChange.loc[0])+'</span>':'';
    var boardCellExtra=(bChange&&bChange.ref)?' cell-changed':'';
    var locCellExtra=(bChange&&bChange.loc)?' cell-changed':'';

    var boardCellContent=refOv+X(board.ref);
    if(!readonly){
      boardCellContent+='<div class="bc-actions">'
        +'<button class="bc-btn" onclick="editBoard(\''+board.id+'\')" title="Edit board">✏</button>'
        +'<button class="bc-btn bc-del" onclick="deleteBoard(\''+board.id+'\')" title="Delete board">✕</button>'
        +'</div>';
    }
    var locCellContent=locOv+X(board.loc||'—');

    if(units.length){
      units.forEach(function(unit,unitIdx){
        var key=board.id+'::'+unit.id;
        var rowCls='unit-row'+altClass;
        if(diff&&diff.added[key])rowCls+=' tr-added';
        var diffEntry=diff?diff.changed[key]:null;
        html+='<tr id="ur_'+unit.id+'" class="'+rowCls+'" data-board="'+board.id+'">';
        if(unitIdx===0){
          html+='<td class="board-cell'+boardCellExtra+'" rowspan="'+boardSpanRows+'" id="bcell_'+board.id+'">'+boardCellContent+'</td>';
          html+='<td class="board-cell'+locCellExtra+'" rowspan="'+boardSpanRows+'" style="font-family:\'DM Sans\',sans-serif;font-weight:400;color:var(--text2);border-left:none !important">'+locCellContent+'</td>';
        }
        vcols.forEach(function(c){html+=renderUnitCell(c,unit,board.id,readonly,diffEntry);});
        if(!readonly)html+='<td><button class="del-btn" onclick="deleteUnit(\''+board.id+'\',\''+unit.id+'\')">✕</button></td>';
        html+='</tr>';
      });
    } else {
      html+='<tr class="unit-row'+altClass+'" data-board="'+board.id+'">';
      html+='<td class="board-cell'+boardCellExtra+'" rowspan="'+boardSpanRows+'" id="bcell_'+board.id+'">'+boardCellContent+'</td>';
      html+='<td class="board-cell'+locCellExtra+'" rowspan="'+boardSpanRows+'" style="font-family:\'DM Sans\',sans-serif;font-weight:400;color:var(--text2);border-left:none !important">'+locCellContent+'</td>';
      html+='<td colspan="'+dataColSpan+'" style="padding:14px;text-align:center;color:var(--muted);font-size:12px;font-style:italic">No units yet'+(!readonly?' — click + Add Unit below':'')+'</td>';
      html+='</tr>';
    }

    // Totals row
    var ph1ColIdx=vcols.findIndex(function(c){return c.k==='ph1';});
    var ph2ColIdx=vcols.findIndex(function(c){return c.k==='ph2';});
    var ph3ColIdx=vcols.findIndex(function(c){return c.k==='ph3';});
    var firstPhIdx=[ph1ColIdx,ph2ColIdx,ph3ColIdx].filter(function(x){return x>=0;}).sort(function(a,b){return a-b;})[0];
    html+='<tr class="totals-row'+altClass+'">';
    if(firstPhIdx===undefined){
      html+='<td colspan="'+vcols.length+'" class="fla-label">Total FLA per Board (hidden — enable Phase columns)</td>';
    } else {
      if(firstPhIdx>0){html+='<td colspan="'+firstPhIdx+'" class="fla-label">Total FLA per Board</td>';}
      for(var vi=firstPhIdx;vi<vcols.length;vi++){
        var vc=vcols[vi];
        if(vc.k==='ph1')html+='<td class="fla-total" id="ft1_'+board.id+'">'+ph1.toFixed(1)+' A</td>';
        else if(vc.k==='ph2')html+='<td class="fla-total" id="ft2_'+board.id+'">'+ph2.toFixed(1)+' A</td>';
        else if(vc.k==='ph3')html+='<td class="fla-total" id="ft3_'+board.id+'">'+ph3.toFixed(1)+' A</td>';
        else html+='<td></td>';
      }
    }
    if(!readonly)html+='<td></td>';
    html+='</tr>';

    if(!readonly){
      html+='<tr class="add-unit-row"><td></td><td></td><td colspan="'+dataColSpan+'" style="text-align:left;padding:6px 14px"><button class="add-unit-btn" onclick="addUnit(\''+board.id+'\')">+ Add Equipment</button></td></tr>';
    }
  });

  // Deleted rows (when diffing, append at end, no rowspan)
  if(diff){
    Object.keys(diff.deleted).forEach(function(key){
      var d=diff.deleted[key];
      html+='<tr class="board-sep"><td colspan="'+(2+dataColSpan)+'"></td></tr>';
      html+='<tr class="tr-deleted">';
      html+='<td class="board-cell" style="font-family:\'DM Mono\',monospace;font-size:11px;font-weight:600">'+X(d.boardRef)+'</td>';
      html+='<td class="board-cell" style="font-size:11px;font-family:\'DM Sans\',sans-serif;font-weight:400;border-left:none !important">'+X(d.boardLoc||'—')+'</td>';
      vcols.forEach(function(c){html+='<td>'+X(d[c.k]||'')+'</td>';});
      if(!readonly)html+='<td></td>';
      html+='</tr>';
    });
  }

  // Bottom: + Add Line Item creates a brand new board+row pair
  if(!readonly&&_viewRevIdx===null){
    var totalCols=2+vcols.length+(readonly?0:1);
    html+='<tr class="add-unit-row"><td colspan="'+totalCols+'" style="padding:10px 14px;text-align:left"><button class="add-unit-btn" onclick="addLineItem()">+ Add Line Item (new board)</button></td></tr>';
  }

  html+='</tbody></table></div>';
  mc.innerHTML=html;
}

// ── Board CRUD ──
function openAddBoardModal(){
  _editBoardId=null;
  document.getElementById('boardModalTitle').textContent='Add Board';
  document.getElementById('bm-ref').value='';
  document.getElementById('bm-loc').value='';
  document.getElementById('boardModal').classList.add('open');
  setTimeout(function(){document.getElementById('bm-ref').focus();},80);
}
function editBoard(id){
  var b=_boards.find(function(b){return b.id===id;});
  if(!b)return;
  _editBoardId=id;
  document.getElementById('boardModalTitle').textContent='Edit Board';
  document.getElementById('bm-ref').value=b.ref||'';
  document.getElementById('bm-loc').value=b.loc||'';
  document.getElementById('boardModal').classList.add('open');
  setTimeout(function(){document.getElementById('bm-ref').focus();},80);
}
function closeBoardModal(){
  document.getElementById('boardModal').classList.remove('open');
  _editBoardId=null;
}
function saveBoardModal(){
  var ref=(document.getElementById('bm-ref').value||'').trim();
  if(!ref){alert('Board ID is required');return;}
  var loc=(document.getElementById('bm-loc').value||'').trim();
  if(_editBoardId){
    var b=_boards.find(function(b){return b.id===_editBoardId;});
    if(b){b.ref=ref;b.loc=loc;}
  } else {
    _boards.push({id:nid(),ref:ref,loc:loc,units:[]});
  }
  closeBoardModal();
  _revData.mssb_draft=true;
  renderBoards();
  renderRevBar();
  saveBoards();
}
function deleteBoard(id){
  var b=_boards.find(function(b){return b.id===id;});
  if(!b||!confirm('Delete board "'+b.ref+'" and all its units?'))return;
  _boards=_boards.filter(function(b){return b.id!==id;});
  _revData.mssb_draft=true;
  renderBoards();renderRevBar();saveBoards();
}

// ── Unit CRUD ──
function addUnit(boardId){
  var board=_boards.find(function(b){return b.id===boardId;});
  if(!board)return;
  board.units=board.units||[];
  board.units.push({id:nid(),unitNum:'',unitDesc:'',suppFrom:'',suppLoc:'',duty:'',starter:'',lamps:'',power:'',ph1:'',ph2:'',ph3:'',meterRef:'',ctrlSw:''});
  _revData.mssb_draft=true;
  renderBoards();saveBoards();
}

// Add a fresh blank line — creates a new placeholder board (empty ref/loc) with one unit.
// User fills Board ID inline; if that ID matches an existing board, the row auto-merges into it.
function addLineItem(){
  var newBoard={id:nid(),ref:'',loc:'',units:[]};
  newBoard.units.push({id:nid(),unitNum:'',unitDesc:'',suppFrom:'',suppLoc:'',duty:'',starter:'',lamps:'',power:'',ph1:'',ph2:'',ph3:'',meterRef:'',ctrlSw:''});
  _boards.push(newBoard);
  _revData.mssb_draft=true;
  renderBoards();saveBoards();
  // Focus the new row's Board ID input so the user can type immediately
  setTimeout(function(){
    var inp=document.querySelector('input[data-board-ref-id="'+newBoard.id+'"]');
    if(inp)inp.focus();
  },50);
}

// Update a board's ref (Board ID). If the new value matches an existing board's ref,
// move this board's units into that board and remove this one (auto-merge).
function updBoardRef(boardId,val){
  var board=_boards.find(function(b){return b.id===boardId;});
  if(!board)return;
  var trimmed=String(val||'').trim();
  // Auto-merge: if another board already has this ref, move units there
  if(trimmed){
    var target=_boards.find(function(b){return b.id!==boardId&&String(b.ref||'').trim()===trimmed;});
    if(target){
      target.units=(target.units||[]).concat(board.units||[]);
      _boards=_boards.filter(function(b){return b.id!==boardId;});
      _revData.mssb_draft=true;
      renderBoards();saveBoards();
      return;
    }
  }
  board.ref=trimmed;
  _revData.mssb_draft=true;
  saveBoards();
  // Don't full re-render — just update visible cells with the same id
  var cells=document.querySelectorAll('[data-board-ref-display="'+boardId+'"]');
  cells.forEach(function(c){c.textContent=trimmed||'—';});
}

function updBoardLoc(boardId,val){
  var board=_boards.find(function(b){return b.id===boardId;});
  if(!board)return;
  board.loc=String(val||'').trim();
  _revData.mssb_draft=true;
  saveBoards();
  // Update other rows of the same board so they all show the new location
  var cells=document.querySelectorAll('[data-board-loc-display="'+boardId+'"]');
  cells.forEach(function(c){c.textContent=board.loc||'—';});
}
function updUnit(boardId,unitId,key,val){
  var board=_boards.find(function(b){return b.id===boardId;});
  if(!board)return;
  var unit=(board.units||[]).find(function(u){return u.id===unitId;});
  if(!unit)return;
  unit[key]=val;
  // Recompute and update phase totals live (only if a phase value changed)
  if(key==='ph1'||key==='ph2'||key==='ph3'){
    var ph1=0,ph2=0,ph3=0;
    board.units.forEach(function(u){ph1+=fla(u.ph1);ph2+=fla(u.ph2);ph3+=fla(u.ph3);});
    var t1=document.getElementById('ft1_'+boardId);
    var t2=document.getElementById('ft2_'+boardId);
    var t3=document.getElementById('ft3_'+boardId);
    if(t1)t1.textContent=ph1.toFixed(1)+' A';
    if(t2)t2.textContent=ph2.toFixed(1)+' A';
    if(t3)t3.textContent=ph3.toFixed(1)+' A';
  }
  _revData.mssb_draft=true;
  saveBoards();
}
function deleteUnit(boardId,unitId){
  var board=_boards.find(function(b){return b.id===boardId;});
  if(!board)return;
  board.units=board.units.filter(function(u){return u.id!==unitId;});
  _revData.mssb_draft=true;
  renderBoards();saveBoards();
}

function downloadTemplate(){
  // Build empty xlsx with headers only
  var hdrRow=['Board ID','Board Location'].concat(COLS.map(function(c){return c.l;}));
  var aoa=[hdrRow,['Example-MSSB-001','Level 00 - Plantroom'].concat(COLS.map(function(){return '';}))];
  if(typeof XLSX==='undefined'){
    var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=function(){_doTemplateDownload(aoa);};document.head.appendChild(s);
  } else {_doTemplateDownload(aoa);}
}
function _doTemplateDownload(aoa){
  var ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:30},{wch:20}].concat(COLS.map(function(c){return {wch:parseInt(c.w)||16};}));
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'MSSB Schedule');
  XLSX.writeFile(wb,'MSSB Schedule Template.xlsx');
}
function exportXLSX(bds,revLabel){
  bds=bds||_boards;
  if(!revLabel){
    var revs=_revData.mssb||[];
    revLabel=revs.length?revs[revs.length-1].rev:'Draft';
  }
  if(typeof XLSX==='undefined'){
    var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=function(){buildXLSX(bds,revLabel);};document.head.appendChild(s);
  } else {buildXLSX(bds,revLabel);}
}

function buildXLSX(bds,revLabel){
  var hdrRow=['Board ID','Board Location'].concat(COLS.map(function(c){return c.l;}));
  var aoa=[hdrRow];
  var merges=[];

  bds.forEach(function(board){
    var units=board.units||[];
    var startRow=aoa.length;
    if(!units.length){
      aoa.push([board.ref,board.loc].concat(COLS.map(function(){return '';})));
    } else {
      units.forEach(function(unit){
        aoa.push([board.ref,board.loc].concat(COLS.map(function(c){
          var v=unit[c.k]||'';
          return c.num&&v!==''?parseFloat(v)||0:v;
        })));
      });
      if(units.length>1){
        merges.push({s:{r:startRow,c:0},e:{r:startRow+units.length-1,c:0}});
        merges.push({s:{r:startRow,c:1},e:{r:startRow+units.length-1,c:1}});
      }
      // Totals row
      var ph1=0,ph2=0,ph3=0;
      units.forEach(function(u){ph1+=fla(u.ph1);ph2+=fla(u.ph2);ph3+=fla(u.ph3);});
      var tot=['','TOTAL FLA'].concat(COLS.map(function(c){
        if(c.k==='ph1')return ph1;if(c.k==='ph2')return ph2;if(c.k==='ph3')return ph3;return '';
      }));
      aoa.push(tot);
    }
  });

  var ws=XLSX.utils.aoa_to_sheet(aoa);
  if(merges.length)ws['!merges']=merges;
  ws['!cols']=[{wch:30},{wch:16}].concat(COLS.map(function(c){return {wch:parseInt(c.w)||16};}));

  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'MSSB Schedule');
  var wbout=XLSX.write(wb,{bookType:'xlsx',type:'array',cellStyles:true});

  function dl(out){
    var blob=new Blob([new Uint8Array(out)],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='MSSB Schedule '+revLabel+'.xlsx';a.click();URL.revokeObjectURL(a.href);
  }

  function inject(JSZip){
    new JSZip().loadAsync(new Uint8Array(wbout)).then(function(zip){
      var sk=null;zip.forEach(function(p){if(/xl\/worksheets\/sheet\d+\.xml$/.test(p)&&!sk)sk=p;});
      if(!sk){dl(wbout);return;}
      Promise.all([
        zip.file(sk).async('string'),
        zip.file('xl/styles.xml')?zip.file('xl/styles.xml').async('string'):Promise.resolve(null),
        zip.file('xl/metadata.xml')?zip.file('xl/metadata.xml').async('string'):Promise.resolve(null),
        zip.file('[Content_Types].xml').async('string'),
        zip.file('xl/_rels/workbook.xml.rels').async('string')
      ]).then(function(r){
        var sxml=r[0];var stxml=r[1];
        if(r[2]){
          zip.remove('xl/metadata.xml');
          zip.file('[Content_Types].xml',r[3].replace(/<Override[^>]*metadata[^>]*\/>/g,''));
          zip.file('xl/_rels/workbook.xml.rels',r[4].replace(/<Relationship[^>]*metadata[^>]*\/>/g,''));
        }
        if(stxml){
          // Add 1 new font (bold white) + 1 new font (bold black for totals)
          stxml=stxml.replace(/<fonts count="(\d+)">/,function(m,n){return '<fonts count="'+(+n+2)+'">';});
          stxml=stxml.replace('</fonts>','<font><b/><sz val="10"/><name val="Arial"/><color rgb="FFFFFFFF"/></font><font><b/><sz val="10"/><name val="Arial"/><color rgb="FF000000"/></font></fonts>');
          // Add 2 new fills: dark header + light-grey totals
          stxml=stxml.replace(/<fills count="(\d+)">/,function(m,n){return '<fills count="'+(+n+2)+'">';});
          stxml=stxml.replace('</fills>','<fill><patternFill patternType="solid"><fgColor rgb="FF0E1520"/><bgColor indexed="64"/></patternFill></fill><fill><patternFill patternType="solid"><fgColor rgb="FFE8F4EA"/><bgColor indexed="64"/></patternFill></fill></fills>');
          // Add 1 new border (thin grey all sides)
          var te='<color rgb="FF999999"/>';
          var b4='<border><left style="thin">'+te+'</left><right style="thin">'+te+'</right><top style="thin">'+te+'</top><bottom style="thin">'+te+'</bottom></border>';
          stxml=stxml.replace(/<borders count="(\d+)">/,function(m,n){return '<borders count="'+(+n+1)+'">';});
          stxml=stxml.replace('</borders>',b4+'</borders>');
          // Compute indices of newly added items (last ones)
          var fontsCount=parseInt((stxml.match(/<fonts count="(\d+)">/)||[0,2])[1]);
          var fillsCount=parseInt((stxml.match(/<fills count="(\d+)">/)||[0,4])[1]);
          var bdi=parseInt((stxml.match(/<borders count="(\d+)">/)||[0,2])[1])-1;
          var fiHdr=fontsCount-2;   // bold white (header)
          var fiTot=fontsCount-1;   // bold black (totals)
          var fliHdr=fillsCount-2;  // dark
          var fliTot=fillsCount-1;  // light green
          // Add 3 new cellXfs: header, data, totals
          stxml=stxml.replace(/<cellXfs count="(\d+)">/,function(m,n){return '<cellXfs count="'+(+n+3)+'">';});
          stxml=stxml.replace('</cellXfs>',
            '<xf numFmtId="0" fontId="'+fiHdr+'" fillId="'+fliHdr+'" borderId="'+bdi+'" xfId="0" applyFont="1" applyFill="1" applyBorder="1" applyAlignment="1"><alignment horizontal="center" vertical="center" wrapText="1"/></xf>'
            +'<xf numFmtId="0" fontId="0" fillId="0" borderId="'+bdi+'" xfId="0" applyBorder="1" applyAlignment="1"><alignment horizontal="left" vertical="center" wrapText="0"/></xf>'
            +'<xf numFmtId="0" fontId="'+fiTot+'" fillId="'+fliTot+'" borderId="'+bdi+'" xfId="0" applyFont="1" applyFill="1" applyBorder="1" applyAlignment="1"><alignment horizontal="center" vertical="center"/></xf>'
            +'</cellXfs>');
          var tx=parseInt((stxml.match(/<cellXfs count="(\d+)">/)||[0,3])[1]);
          var hs=tx-3;  // header style index
          var ds=tx-2;  // data style index
          var ts=tx-1;  // totals style index
          zip.file('xl/styles.xml',stxml);
          // Patch ALL rows — apply header style to row 1, totals style to any row whose B cell contains "TOTAL FLA", data style to the rest.
          sxml=sxml.replace(/<row r="(\d+)"([^>]*)>([\s\S]*?)<\/row>/g,function(m,rowNum,rowAttrs,rowBody){
            var isHeader=(rowNum==='1');
            // Is this a totals row? column B inlineStr contains "TOTAL FLA"
            var isTotals=/<c r="B\d+"[^>]*t="str"[^>]*><f>[\s\S]*?<\/f><v>TOTAL FLA<\/v><\/c>/.test(rowBody)
              ||/<c r="B\d+"[^>]*t="str"[^>]*>\s*<v>TOTAL FLA<\/v>\s*<\/c>/.test(rowBody)
              ||/<c r="B\d+"[^>]*><is><t>TOTAL FLA<\/t><\/is><\/c>/.test(rowBody)
              ||rowBody.indexOf('>TOTAL FLA<')>=0;
            var styleToApply=isHeader?hs:(isTotals?ts:ds);
            var newBody=rowBody.replace(/ s="\d+"/g,'').replace(/<c r="([^"]+)"([^>]*)>/g,function(mm,ref,rest){
              return '<c r="'+ref+'" s="'+styleToApply+'"'+rest+'>';
            });
            return '<row r="'+rowNum+'"'+rowAttrs+'>'+newBody+'</row>';
          });
        }
        sxml=sxml.replace(/<ignoredErrors[^>]*>[\s\S]*?<\/ignoredErrors>/g,'').replace(/<ignoredErrors[^>]*\/>/g,'');
        zip.file(sk,sxml);
        zip.generateAsync({type:'arraybuffer'}).then(function(out){dl(out);});
      }).catch(function(){dl(wbout);});
    }).catch(function(){dl(wbout);});
  }

  if(typeof JSZip!=='undefined'){inject(JSZip);}
  else{var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';s.onload=function(){inject(JSZip);};s.onerror=function(){dl(wbout);};document.head.appendChild(s);}
}

// ── Export PDF (uses browser print → "Save as PDF") ──
function exportPDF(){
  // Make sure Track Changes state and current view are reflected. The print stylesheet
  // (in <style>) hides toolbars/sidebars, lays out the table for paper, and preserves
  // diff highlighting if Track Changes is on.
  var revs=_revData.mssb||[];
  var revLabel;
  if(_viewRevIdx===null||_viewRevIdx===undefined){
    revLabel=_revData.mssb_draft?('Rev '+String(revs.length+1).padStart(2,'0')+' Draft'):(revs.length?revs[revs.length-1].rev:'Draft');
  } else if(_viewRevIdx===-1){
    revLabel='Rev '+String(revs.length+1).padStart(2,'0')+' Draft';
  } else {
    revLabel=(revs[_viewRevIdx]&&revs[_viewRevIdx].rev)||'Revision';
  }
  var viewLabel=_viewMode==='list'?'List View':'Grouped View';
  var projName=(_proj&&(_proj.name||_proj.projectName))||'Project';
  var docTitle='MSSB Schedule — '+projName+' — '+viewLabel+' — '+revLabel;
  // Inject print header banner (pulled out after print)
  var banner=document.createElement('div');
  banner.id='__printBanner';
  banner.style.cssText='display:none';
  banner.innerHTML='<style>@media print{#__printBanner{display:block !important;padding:8px 0 14px;border-bottom:1.5px solid #000;margin-bottom:14px;font-family:Arial,sans-serif}#__printBanner h1{margin:0;font-size:14pt;color:#000}#__printBanner .pb-meta{margin-top:4px;font-size:9pt;color:#444}@page{size:A3 landscape;margin:12mm}}</style>'
    +'<h1>MSSB Schedule</h1>'
    +'<div class="pb-meta">Project: '+X(projName)+' &nbsp;&middot;&nbsp; View: '+X(viewLabel)+' &nbsp;&middot;&nbsp; Revision: '+X(revLabel)+' &nbsp;&middot;&nbsp; Date: '+todayStr()+'</div>';
  var mc=document.getElementById('mainContent');
  mc.parentNode.insertBefore(banner,mc);
  var prevTitle=document.title;
  document.title=docTitle;
  setTimeout(function(){
    window.print();
    setTimeout(function(){
      var b=document.getElementById('__printBanner');if(b)b.parentNode.removeChild(b);
      document.title=prevTitle;
    },500);
  },120);
}

// ── Import XLSX ──
function triggerImport(){
  if(!isEditable()){
    if(_revData.mssb_draft){
      if(!confirm('You need to be in edit mode to import.\n\nClick OK to enter edit mode, or Cancel.'))return;
      editDraft();
    } else {
      if(!confirm('Importing will start a new draft. Continue?'))return;
      startDraft();
    }
  }
  document.getElementById('importFile').click();
}

function handleImport(e){
  var file=e.target.files[0];if(!file)return;e.target.value='';
  if(typeof XLSX==='undefined'){
    var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=function(){parseImport(file);};document.head.appendChild(s);
  } else {parseImport(file);}
}

function parseImport(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      // Find header row — accept both old and new header names
      var hr=-1;
      for(var i=0;i<Math.min(aoa.length,25);i++){
        if(aoa[i].some(function(v){
          var s=String(v||'').toLowerCase();
          return s.includes('board id')||s.includes('mssb reference')||s.includes('equipment id')||s.includes('unit number');
        })){hr=i;break;}
      }
      if(hr<0){alert('Could not find header row.');return;}
      var hdrs=aoa[hr].map(function(h){return String(h||'').toLowerCase().replace(/\n/g,' ').trim();});
      function col(keys){for(var i=0;i<keys.length;i++){var idx=hdrs.indexOf(keys[i]);if(idx>=0)return idx;}return -1;}
      var cm={
        mssbRef:col(['board id','mssb reference']),
        mssbLoc:col(['board location','mssb location']),
        unitNum:col(['equipment id','unit number']),
        unitDesc:col(['equipment location','unit description']),
        suppFrom:col(['supplied from']),
        suppLoc:col(['supplied from location']),
        duty:col(['duty / standby','duty/standby']),
        starter:col(['motor starter type','motor starter type (vsd / ec / dol)']),
        lamps:col(['lamps']),
        power:col(['power (kw)','power consumption (kw)']),
        ph1:col(['phase 1 fla (a)']),ph2:col(['phase 2 fla (a)']),ph3:col(['phase 3 fla (a)']),
        meterRef:col(['meter reference','electrical meter reference id']),
        ctrlSw:col(['control switch'])
      };
      var boardMap={};var boardOrder=[];
      for(var ri=hr+1;ri<aoa.length;ri++){
        var row=aoa[ri];
        if(!row||row.every(function(v){return !v;}))continue;
        var ref=String(row[cm.mssbRef]||'').trim();
        if(!ref||ref.toLowerCase().includes('total'))continue;
        if(!boardMap[ref]){boardMap[ref]={id:nid(),ref:ref,loc:String(row[cm.mssbLoc]||'').trim(),units:[]};boardOrder.push(ref);}
        function g(k){return cm[k]>=0?String(row[cm[k]]||'').trim():'';}
        boardMap[ref].units.push({id:nid(),unitNum:g('unitNum'),unitDesc:g('unitDesc'),suppFrom:g('suppFrom'),suppLoc:g('suppLoc'),duty:g('duty'),starter:g('starter').replace(/\n/g,'/'),lamps:g('lamps'),power:g('power'),ph1:g('ph1'),ph2:g('ph2'),ph3:g('ph3'),meterRef:g('meterRef'),ctrlSw:g('ctrlSw')});
      }
      if(!boardOrder.length){alert('No board data found.');return;}
      var totalUnits=boardOrder.reduce(function(s,r){return s+boardMap[r].units.length;},0);
      if(!confirm('Import '+boardOrder.length+' boards with '+totalUnits+' units?\n\nThis will replace all current board data.'))return;
      _boards=boardOrder.map(function(r){return boardMap[r];});
      _revData.mssb_draft=true;
      renderBoards();renderRevBar();saveBoards();
      updateTemplateBtnVisibility();
      alert('Imported '+boardOrder.length+' boards successfully.');
    }catch(err){alert('Import failed: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}
</script>
