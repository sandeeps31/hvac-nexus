<style>
:root{--bg:#080c12;--surface:#0e1520;--surface2:#141e2e;--surface3:#1a2640;--border:#1e3050;--accent:#00c8ff;--accent-dim:rgba(0,200,255,.10);--green:#00e5a0;--green-dim:rgba(0,229,160,.10);--warn:#ffb830;--warn-dim:rgba(255,184,48,.10);--danger:#ff4d6d;--danger-dim:rgba(255,77,109,.10);--purple:#a78bfa;--purple-dim:rgba(167,139,250,.10);--text:#ddeeff;--text2:#7a9bbf;--muted:#3d5a7a;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13.5px;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px}
.bc{display:flex;align-items:center;gap:7px;font-size:13px;flex:1;min-width:0}.bcl{color:var(--text2);cursor:pointer;white-space:nowrap}.bcl:hover{color:var(--accent)}.bcs{color:var(--muted)}.bcc{color:var(--text);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{padding:6px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.bp{background:var(--accent);color:#080c12}.bp:hover{background:#33d4ff}
.bg{background:transparent;color:var(--text2);border:1px solid var(--border)}.bg:hover{color:var(--text);border-color:var(--muted);background:var(--surface2)}
.bsm{padding:5px 12px;font-size:12px}
.bdanger{background:transparent;color:var(--danger);border:1px solid rgba(255,77,109,.3)}.bdanger:hover{background:var(--danger-dim)}

/* STATUS BADGE */
.status-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.status-sel{background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;padding:5px 10px;outline:none;cursor:pointer}
.status-sel:focus{border-color:var(--accent)}.status-sel option{background:var(--surface2)}
.st-notstarted{color:var(--muted)}.st-inprogress{color:var(--warn)}.st-action{color:var(--danger)}.st-closed{color:var(--green)}

/* HEADER CARD */
.form-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px}
.form-meta{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:12px}
.fmf{display:flex;flex-direction:column;gap:3px}
.fmf-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.fmf-val{font-size:13px;color:var(--text)}
.fmf-val.mono{font-family:'DM Mono',monospace;color:var(--accent)}
.fmf-val.green{color:var(--green)}
.doc-input{background:var(--surface3);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:5px 9px;outline:none;width:100%;transition:border-color .2s}
.doc-input:focus{border-color:var(--accent)}.doc-input::placeholder{color:var(--muted)}

/* PROGRESS BAR */
.progress-bar-wrap{margin-top:12px}
.progress-lbl{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px}
.progress-lbl .pct-val{color:var(--green);font-size:13px;font-weight:700}
.progress-track{height:18px;background:var(--surface3);border-radius:9px;overflow:hidden;border:1px solid var(--border);position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,#00e5a0,#00c8a0);border-radius:9px;transition:width .5s cubic-bezier(.4,0,.2,1);min-width:0}
.progress-fill.has-value{min-width:32px}
.progress-inner-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:#080c12;mix-blend-mode:normal;pointer-events:none}

/* SECTIONS */
.page{padding:14px 20px 80px}
.sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.sec-hdr{padding:11px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.sec-hdr:hover{background:var(--surface3)}
.sec-ref{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);font-weight:700;flex-shrink:0;min-width:55px}
.sec-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);flex:1}
.sec-cx-tag{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(0,200,255,.2)}
.sec-pct{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);padding:2px 8px;background:var(--surface3);border-radius:4px;border:1px solid var(--border);flex-shrink:0}
.sec-chev{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.sec.collapsed .sec-chev{transform:rotate(-90deg)}
.sec.collapsed .sec-body{display:none}
.sec-body{padding:0}

/* ROWS */
.row-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.row-item:last-child{border-bottom:none}
.row-step{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:28px;flex-shrink:0;text-align:center}
.row-desc{flex:1;font-size:13px;color:var(--text2);line-height:1.4}
.row-mandatory::after{content:'*';color:var(--danger);margin-left:3px;font-size:11px}
.row-response{flex-shrink:0;display:flex;align-items:center;gap:6px}

/* RESPONSE CONTROLS */
.yn-group{display:flex;gap:4px}
.yn-btn{padding:5px 12px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.yn-btn:hover{border-color:var(--muted);color:var(--text)}
.yn-btn.sel-yes{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.yn-btn.sel-no{border-color:var(--danger);background:var(--danger-dim);color:var(--danger)}
.yn-btn.sel-na{border-color:var(--muted);background:var(--surface3);color:var(--muted)}
.yn-btn.sel-pass{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.yn-btn.sel-fail{border-color:var(--danger);background:var(--danger-dim);color:var(--danger)}

.text-inp{background:var(--surface3);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;padding:6px 10px;outline:none;width:200px;transition:border-color .2s}
.text-inp:focus{border-color:var(--accent)}.text-inp::placeholder{color:var(--muted)}

.photo-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s}
.photo-btn:hover{border-color:var(--accent);color:var(--accent)}
.photo-btn input{display:none}
.photo-count{font-family:'DM Mono',monospace;font-size:10px;padding:1px 6px;border-radius:10px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(0,200,255,.2)}

/* PLANT SECTION (special table layout) */
.plant-tbl{width:100%;border-collapse:collapse}
.plant-tbl td{padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px}
.plant-tbl tr:last-child td{border-bottom:none}
.plant-lbl{color:var(--text2);width:160px}
.plant-val{color:var(--text)}
.plant-inp{background:var(--surface3);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:6px 10px;outline:none;width:100%;transition:border-color .2s}
.plant-inp:focus{border-color:var(--accent)}.plant-inp::placeholder{color:var(--muted)}

/* SIGN-OFF SECTION */
.signoff-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}
.signoff-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:10px}
.signoff-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:1px}
.signoff-user-row{display:flex;align-items:center;gap:10px}
.signoff-user-sel{background:var(--surface3);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;padding:6px 10px;outline:none;cursor:pointer;flex:1}
.signoff-user-sel:focus{border-color:var(--accent)}.signoff-user-sel option{background:var(--surface2)}
.sig-box{background:var(--bg);border:2px dashed var(--border);border-radius:8px;height:90px;position:relative;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s}
.sig-box:hover{border-color:var(--muted)}
.sig-box.signed{border-style:solid;border-color:var(--green)}
.sig-box canvas{position:absolute;inset:0;width:100%;height:100%}
.sig-box-placeholder{color:var(--muted);font-size:12px;pointer-events:none;text-align:center;line-height:1.5}
.sig-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);display:flex;justify-content:space-between}
.sig-meta.done{color:var(--green)}
.sig-action-row{display:flex;gap:6px;align-items:center}
.sig-confirm-btn{flex:1;padding:7px;border-radius:6px;background:var(--green);color:#080c12;border:none;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s}
.sig-confirm-btn:hover{background:#00ffb3}
.sig-cancel-btn{padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer}
.sig-cancel-btn:hover{border-color:var(--danger);color:var(--danger)}
.sig-clear-btn{padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;flex-shrink:0}
.sig-clear-btn:hover{color:var(--danger);border-color:var(--danger)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:600;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:0;max-width:96vw;transform:translateY(10px);transition:transform .2s;max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
.mo.open .modal{transform:translateY(0)}
.modal-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-hdr h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--text)}
.modal-hdr p{color:var(--text2);font-size:12.5px;margin-top:3px}
.modal-body{padding:18px 22px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.ml{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;margin-top:12px;display:block}
.ml:first-child{margin-top:0}
.mi{width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 11px;outline:none}
.mi:focus{border-color:var(--accent)}.mi::placeholder{color:var(--muted)}

/* Sig modal canvas */
.sig-draw-area{background:var(--bg);border:2px solid var(--border);border-radius:8px;touch-action:none;display:block;cursor:crosshair}
.sig-tabs{display:flex;gap:4px;margin-bottom:14px}
.sig-tab{padding:6px 16px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12.5px;cursor:pointer;transition:all .15s}
.sig-tab.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.sig-type-input{background:var(--surface3);border:2px solid var(--border);border-radius:8px;color:var(--text);font-family:'Dancing Script',cursive;font-size:28px;padding:12px 16px;outline:none;width:100%;text-align:center}
.sig-type-input:focus{border-color:var(--accent)}
.sig-preview{height:80px;background:var(--bg);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;margin-top:10px;font-size:26px;color:var(--text);font-family:'Dancing Script',cursive}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0e1520;border:1px solid #00e5a0;color:#00e5a0;font-family:'DM Mono',monospace;font-size:12px;padding:10px 20px;border-radius:8px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}


/* ── SIDEBAR STANDARD ── */
.main{margin-left:0;transition:margin-left .25s}
.row-actions{display:flex;align-items:center;flex-shrink:0}
.row-stamp{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);min-width:160px;text-align:right;padding-right:10px}
.defect-btn{font-size:11px;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:5px;border:1px solid rgba(255,77,109,.4);background:rgba(255,77,109,.08);color:var(--danger);cursor:pointer;white-space:nowrap;transition:all .15s}
.defect-btn:hover{background:rgba(255,77,109,.18);border-color:var(--danger)}
.defect-mo{position:fixed;inset:0;background:rgba(4,8,16,.82);z-index:2000;display:none;align-items:center;justify-content:center}
.defect-mo.open{display:flex}
.defect-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:440px;max-width:96vw;display:flex;flex-direction:column}
.defect-card-hdr{padding:14px 18px 10px;border-bottom:1px solid var(--border);font-family:'Syne',sans-serif;font-size:14px;font-weight:800}
.defect-card-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px}
.defect-card-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
</style>

<div class="topbar">

  <div class="status-wrap">
    <span style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)">Status</span>
    <select class="status-sel" id="statusSel" onchange="updateStatus(this.value)" disabled>

      <option value="action">Action Required</option>

      <button id="editItpBtn" onclick="toggleEditMode()" style="background:var(--accent);border:none;color:#000;border-radius:7px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700">✎ Edit ITP</button>
      <button id="repinBtn" onclick="openRepinDrawing()" style="display:none;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px" title="Open drawing and move pin">📍 Repin</button>

<!-- HEADER CARD -->

  <div class="form-meta" id="formMeta"></div>

      <div class="progress-fill" id="progressFill" style="width:0%"></div>

<!-- SIGNATURE MODAL -->
<div class="mo" id="sigModal" onclick="if(event.target===this)closeSigModal()">
  <div class="modal" style="width:480px">
    <div class="modal-hdr">
      <h3 id="sigModalTitle">Sign Off</h3>
      <p id="sigModalSub"></p>
    </div>
    <div class="modal-body">
      <div class="sig-tabs">
        <div class="sig-tab active" id="tabDraw" onclick="setSigTab('draw')">✍ Draw</div>
        <div class="sig-tab" id="tabType" onclick="setSigTab('type')">⌨ Type</div>
      </div>

        <canvas class="sig-draw-area" id="sigCanvas" width="436" height="180"></canvas>

          <option value="">— Select user —</option>

      </div>

      <button class="bp bsm btn" onclick="confirmSig()">Confirm Sign-off</button>

<script>
// ═══════════════════════════════════════════════════
// ITP FORM — HVAC NEXUS
// Opens from drawings pin click via URL params:
//   ?drawingId=xxx&pinId=xxx
// ═══════════════════════════════════════════════════

var _ifProj=dbGetCurrentProject();
var _ifPNum=_ifProj.num||_ifProj.number||'GCT001';
var SIG_SK='hvacnexus_user_signatures'; // signatures stay local

var drawingId = '', pinId = '';
var pin = null, itpTemplate = null, itpRevision = null;
var responses = {}; // responses[pinId] = {status, docNo, rows:{rowId:{value}}, signoffs:{key:{user,date,sigData}}}
var allResponses = {};
var activeSigKey = null; // which signoff slot is being signed
var sigTab = 'draw';
var sigDrawing = false;
var sigCtx = null;
var sigLastX = 0, sigLastY = 0;


function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){if(!d)return '—';var p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}

// ── LOAD DATA ──
async function loadDrawings(){try{var p=await dbGetDrawings(_ifPNum);return Array.isArray(p)?p:[];}catch(e){return [];}}
async function loadTemplates(){try{var s=await dbGetItpProjectTemplates(_ifPNum);return Array.isArray(s)?s:[];}catch(e){return [];}}
async function loadEquipSchedule(){try{return await dbGetEquipment(_ifPNum)||null;}catch(e){return null;}}
async function loadResponses(){try{return await dbGetItpResponses(_ifPNum)||{};}catch(e){return {};}}
function saveResponses(){dbSetItpResponses(_ifPNum,allResponses).catch(e=>console.error(e));}
function loadSigs(){try{var s=localStorage.getItem(SIG_SK);if(s)return JSON.parse(s);}catch(e){}return{};}
function saveSigs(sigs){try{localStorage.setItem(SIG_SK,JSON.stringify(sigs));}catch(e){}}
async function loadSettings(){try{return await dbGetCompanySettings()||{};}catch(e){return {};}}

// ── INIT ──
(async function(){
  var params=new URLSearchParams(window.location.search);
  drawingId=params.get('drawingId')||'';
  pinId=params.get('pinId')||'';

  // Load pin
  var _drawings=await dbGetDrawings(_ifPNum)||[];
  var _drawing=Array.isArray(_drawings)?_drawings.find(function(d){return d.id===drawingId;}):null;
  if(_drawing&&Array.isArray(_drawing.pins)){pin=_drawing.pins.find(function(p){return p.id===pinId;})||null;}

  if(!pin){
    document.getElementById('formPage').innerHTML='<div style="padding:60px;text-align:center;color:var(--muted)"><div style="font-size:40px;margin-bottom:16px">⚠️</div><div style="font-size:16px">Pin not found. Please return to drawings.</div><br><button class="btn bp" onclick="goBack()">✕ Close Tab</button></div>';
    return;
  }

  // Find ITP template
  var _templates=await dbGetItpProjectTemplates(_ifPNum)||[];
  var matched=Array.isArray(_templates)?_templates.find(function(t){return t.itpType===pin.itpTypeLabel||t.itpNo===pin.ref;}):null;
  if(matched){
    itpTemplate=matched;
    // Use current revision
    var rev=matched.revisions[matched.revisions.length-1];
    // Prefer current status rev
    matched.revisions.forEach(function(r){if(r.status==='current')rev=r;});
    itpRevision=rev;
  }

  // Load responses
  allResponses=await dbGetItpResponses(_ifPNum)||{};
  if(!allResponses[pinId]){
    allResponses[pinId]={status:'not-started',docNo:pin.docNo||'',rows:{},signoffs:{}};
  }
  responses=allResponses[pinId];

  // Load equipment into cache
  try{_cachedEquipData=await dbGetEquipment(_ifPNum)||null;}catch(e){_cachedEquipData=null;}

  // Set status dropdown
  document.getElementById('statusSel').value=responses.status||'not-started';

  // Breadcrumb

  // Render
  renderHeader();
  renderSections();
  updateProgress();

  // Auto-scroll to section if ?section= param present
  var sectionParam=params.get('section');
  if(sectionParam){
    setTimeout(function(){
      var secs=document.querySelectorAll('.sec');
      for(var i=0;i<secs.length;i++){
        var nm=secs[i].querySelector('.sec-name');
        if(nm&&(nm.textContent.toLowerCase().includes('pre')||
           (sectionParam==='precx'&&nm.textContent.toLowerCase().includes('commission')))){
          // Find the Pre-Cx section specifically
          if(sectionParam==='precx'&&!nm.textContent.toLowerCase().includes('pre')) continue;
          secs[i].scrollIntoView({behavior:'smooth',block:'start'});
          // Flash highlight
          secs[i].style.boxShadow='0 0 0 2px var(--accent)';
          setTimeout(function(el){el.style.boxShadow='';},2000,secs[i]);
          break;
        }
      }
    },400);
  }
})();

// ── EQUIPMENT DATA ──
function getEquipData(equipId){
  if(!equipId)equipId=responses.equipId||pin.equip||'';
  if(!equipId)return null;
  var eq=_cachedEquipData;if(!eq||!eq.tabs)return null;
  for(var i=0;i<eq.tabs.length;i++){
    var tab=eq.tabs[i];
    for(var j=0;j<(tab.rows||[]).length;j++){
      var r=tab.rows[j];
      if((r.tag||r.equipId||'').toLowerCase()===equipId.toLowerCase())return r;
    }
  }
  return null;
}

// ── REGULAR ROW ──

  var descEl=document.createElement('div');descEl.className='row-desc'+(row.flags&&row.flags.mandatory?' row-mandatory':'');descEl.textContent=row.desc||'';

// ── YES/NO BUTTONS ──
function renderYesNo(key,options,stored){
  var group=document.createElement('div');group.className='yn-group';
  options.forEach(function(opt){
    var btn=document.createElement('button');btn.className='yn-btn';btn.textContent=opt;
    var selClass=opt==='YES'||opt==='PASS'?'sel-yes':opt==='NO'||opt==='FAIL'?'sel-no':'sel-na';
    if(stored===opt)btn.classList.add(opt==='PASS'?'sel-pass':opt==='FAIL'?'sel-fail':selClass);
    (function(b,o,k,sc){b.onclick=function(){
      var isSelected=b.classList.contains(o==='PASS'?'sel-pass':o==='FAIL'?'sel-fail':sc);
      group.querySelectorAll('.yn-btn').forEach(function(x){x.className='yn-btn';});
      if(!isSelected){
        b.classList.add(o==='PASS'?'sel-pass':o==='FAIL'?'sel-fail':sc);
        responses.rows[k]=o;
        var u=dbGetCurrentUser();
        var now=new Date();
        var hh=now.getHours();var ampm=hh>=12?'pm':'am';hh=hh%12||12;
        var mm=String(now.getMinutes()).padStart(2,'0');
        responses.rows[k+'_stamp']={user:u?(u.name||u.username||'Unknown'):'Unknown',date:todayStr(),time:hh+':'+mm+ampm};
      } else {
        delete responses.rows[k];
        delete responses.rows[k+'_stamp'];
      }
      autosave();updateProgress();
      var stampEl=document.getElementById('stamp_'+k.replace(/[^a-zA-Z0-9]/g,'_'));
      if(stampEl){var st=responses.rows[k+'_stamp'];stampEl.textContent=st?(st.user+' · '+st.date+(st.time?' '+st.time:'')):'';} 
    };})(btn,opt,key,selClass);
    group.appendChild(btn);
  });
  return group;
}

// ── PHOTO BUTTON ──

// ── SIGNATURE MODAL ──
function openSigModal(sigKey, userName){
  activeSigKey=sigKey;
  document.getElementById('sigModalTitle').textContent=sigKey==='assignee'?'Assignee Sign-off':'QA Sign-off';
  document.getElementById('sigModalSub').textContent='Signing as: '+userName;
  // Populate user selector
  var cs=loadSettings();
  var sel=document.getElementById('sigUserSel');sel.innerHTML='';
  var users=[cs.userName||'Sandeep S'];
  users.forEach(function(u){var o=document.createElement('option');o.value=u;o.textContent=u;sel.appendChild(o);});
  sel.value=userName;
  // Check if user has saved sig
  var sigs=loadSigs();
  setSigTab(sigTab);
  clearSigCanvas();
  document.getElementById('sigTypeInput').value='';
  document.getElementById('sigTypePreview').textContent='';
  // Pre-fill draw canvas with saved sig if exists
  if(sigs[userName]&&sigs[userName].drawData){
    var img=new Image();img.onload=function(){sigCtx.drawImage(img,0,0);};img.src=sigs[userName].drawData;
  }
  document.getElementById('sigModal').classList.add('open');
}
function closeSigModal(){document.getElementById('sigModal').classList.remove('open');activeSigKey=null;}
function cancelSig(){closeSigModal();}
function confirmSig(){
  var user=document.getElementById('sigUserSel').value;
  if(!user){showToast('Please select a user');return;}
  var sigData=null,sigText=null;
  if(sigTab==='draw'){
    // Check canvas has something
    var canvas=document.getElementById('sigCanvas');
    var blank=isCanvasBlank(canvas);
    if(blank){showToast('Please draw your signature');return;}
    sigData=canvas.toDataURL('image/png');
    // Save to user sig store
    var sigs=loadSigs();
    if(!sigs[user])sigs[user]={};
    sigs[user].drawData=sigData;
    saveSigs(sigs);
  } else {
    sigText=document.getElementById('sigTypeInput').value.trim();
    if(!sigText){showToast('Please type your name');return;}
  }
  if(!responses.signoffs)responses.signoffs={};
  responses.signoffs[activeSigKey]={user:user,date:todayStr(),confirmed:true,sigData:sigData,sigText:sigText};
  autosave();updateProgress();
  closeSigModal();
  renderSections();
  showToast('✓ Signed off by '+user);
}

function isCanvasBlank(canvas){
  var blank=document.createElement('canvas');blank.width=canvas.width;blank.height=canvas.height;
  return canvas.toDataURL()===blank.toDataURL();
}

// ── SIG TAB ──
function setSigTab(tab){
  sigTab=tab;
  document.getElementById('tabDraw').classList.toggle('active',tab==='draw');
  document.getElementById('tabType').classList.toggle('active',tab==='type');
  document.getElementById('sigDrawPanel').style.display=tab==='draw'?'':'none';
  document.getElementById('sigTypePanel').style.display=tab==='type'?'':'none';
  if(tab==='draw')initSigCanvas();
}
function updateSigPreview(){
  var val=document.getElementById('sigTypeInput').value;
  document.getElementById('sigTypePreview').textContent=val;
}

// ── CANVAS DRAWING ──
function initSigCanvas(){
  var canvas=document.getElementById('sigCanvas');
  sigCtx=canvas.getContext('2d');
  sigCtx.strokeStyle='#ddeeff';sigCtx.lineWidth=2.5;sigCtx.lineCap='round';sigCtx.lineJoin='round';
  canvas.onmousedown=function(e){sigDrawing=true;var r=canvas.getBoundingClientRect();sigLastX=(e.clientX-r.left)*(canvas.width/r.width);sigLastY=(e.clientY-r.top)*(canvas.height/r.height);sigCtx.beginPath();sigCtx.moveTo(sigLastX,sigLastY);};
  canvas.onmousemove=function(e){if(!sigDrawing)return;var r=canvas.getBoundingClientRect();var x=(e.clientX-r.left)*(canvas.width/r.width);var y=(e.clientY-r.top)*(canvas.height/r.height);sigCtx.lineTo(x,y);sigCtx.stroke();sigLastX=x;sigLastY=y;};
  canvas.onmouseup=canvas.onmouseleave=function(){sigDrawing=false;};
  // Touch
  canvas.ontouchstart=function(e){e.preventDefault();sigDrawing=true;var t=e.touches[0];var r=canvas.getBoundingClientRect();sigLastX=(t.clientX-r.left)*(canvas.width/r.width);sigLastY=(t.clientY-r.top)*(canvas.height/r.height);sigCtx.beginPath();sigCtx.moveTo(sigLastX,sigLastY);};
  canvas.ontouchmove=function(e){e.preventDefault();if(!sigDrawing)return;var t=e.touches[0];var r=canvas.getBoundingClientRect();var x=(t.clientX-r.left)*(canvas.width/r.width);var y=(t.clientY-r.top)*(canvas.height/r.height);sigCtx.lineTo(x,y);sigCtx.stroke();sigLastX=x;sigLastY=y;};
  canvas.ontouchend=function(){sigDrawing=false;};
}
function clearSigCanvas(){
  var canvas=document.getElementById('sigCanvas');
  if(!sigCtx){sigCtx=canvas.getContext('2d');}
  sigCtx.clearRect(0,0,canvas.width,canvas.height);
  initSigCanvas();
}

// ── PROGRESS ──
function updateProgress(){
  if(!itpRevision||!itpRevision.sections)return;
  var total=0,done=0;
  itpRevision.sections.forEach(function(sec){
    if(sec.name==='QA SIGN-OFF'||sec.name==='SIGN-OFF'){
      // Sign-offs are always mandatory
      total+=2;
      if(responses.signoffs&&responses.signoffs.assignee&&responses.signoffs.assignee.confirmed)done++;
      if(responses.signoffs&&responses.signoffs.qa&&responses.signoffs.qa.confirmed)done++;
      return;
    }
    // Only count MANDATORY rows for overall progress
    var secTotal=0,secDone=0;
    sec.rows.forEach(function(row){
      if(row.checkType==='signoff')return;
      var isMandatory=row.flags&&row.flags.mandatory;
      var key=sec.id+'_'+row.id;
      var val=responses.rows[key];
      var haVal=val!==undefined&&val!==null&&val!==''&&!(Array.isArray(val)&&val.length===0);
      if(isMandatory){
        total++;
        if(haVal)done++;
        secTotal++;
        if(haVal)secDone++;
      }
    });
    var pctEl=document.getElementById('sec-pct-'+sec.id);
    if(pctEl)pctEl.textContent=secTotal?Math.round(secDone/secTotal*100)+'%':'—';
  });
  var pct=total?Math.round(done/total*100):0;
  var pctStr=pct+'%';
  document.getElementById('progressPct').textContent=pctStr;
  document.getElementById('progressInner').textContent=pctStr;
  var fill=document.getElementById('progressFill');
  fill.style.width=pctStr;
  fill.className='progress-fill'+(pct>0?' has-value':'');
  // Auto-update status
  if(pct===100&&responses.status!=='closed'&&responses.status!=='action'){
    // Don't auto-close — let user do it
  } else if(pct>0&&responses.status==='not-started'){
    responses.status='in-progress';
    document.getElementById('statusSel').value='in-progress';
    autosave();
  }
}

// ── STATUS ──
function updateStatus(val){
  responses.status=val;autosave();
  // Update pin status in drawings
  var drawings=loadDrawings();
  var drawing=drawings.find(function(d){return d.id===drawingId;});
  if(drawing&&drawing.pins){
    var p=drawing.pins.find(function(x){return x.id===pinId;});
    if(p){p.itpStatus=val;dbSetDrawings(_ifPNum,drawings).catch(e=>console.error(e));}
  }
}

// ── AUTOSAVE ──
function autosave(){
  allResponses[pinId]=responses;
  saveResponses();
  var ind=document.getElementById('saveInd');
  ind.style.opacity='1';
  setTimeout(function(){ind.style.opacity='0';},1500);
}

// ── TOAST ──
function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2000);
}

function navTo(url){var b=window.location.href.substring(0,window.location.href.lastIndexOf('/')+1);window.location.href=b+url;}

<script>
var _defectRowKey='', _defectRowDesc='';
function openDefectModal(rowKey, rowDesc){
  _defectRowKey=rowKey; _defectRowDesc=rowDesc;
  document.getElementById('defectDesc').value=rowDesc||'';
  dbGetUsers().then(function(users){
    var sel=document.getElementById('defectAssignee');
    sel.innerHTML='<option value="">— Select user —</option>'
      +(users||[]).map(function(u){return '<option value="'+escH(u.name||u.username||u.id||'')+'">'+escH(u.name||u.username||'Unknown')+'</option>';}).join('');
  });
  document.getElementById('defectMo').classList.add('open');
}
function closeDefectModal(){document.getElementById('defectMo').classList.remove('open');}
async function saveDefect(){
  var desc=document.getElementById('defectDesc').value.trim();
  if(!desc){alert('Please enter a description');return;}
  var assignee=document.getElementById('defectAssignee').value;
  var priority=document.getElementById('defectPriority').value;
  var u=dbGetCurrentUser();
  var existingDefs=[];
  try{existingDefs=await dbGetProject('defects',_ifPNum)||[];}catch(e){}
  if(!Array.isArray(existingDefs))existingDefs=[];
  var maxDef=0;
  existingDefs.forEach(function(d){var m=(d.ref||'').match(/^DEF-(\d+)$/);if(m){var n=parseInt(m[1]);if(n>maxDef)maxDef=n;}});
  var defRef='DEF-'+String(maxDef+1).padStart(4,'0');
  var defect={
    id:'def_'+Date.now(), ref:defRef,
    rowKey:_defectRowKey, desc:desc, assignee:assignee, priority:priority,
    status:'open',
    raisedBy:u?(u.name||u.username||'Unknown'):'Unknown',
    raisedDate:todayStr(),
    itpRef:pin.ref||'', itpType:pin.itpTypeLabel||'',
    equip:pin.equip||'', drawingId:drawingId, pinId:pinId
  };
  try{
    existingDefs.push(defect);
    await dbSetProject('defects',_ifPNum,existingDefs);
  }catch(e){console.error('Defect save error:',e);}
  closeDefectModal();
  var toast=document.createElement('div');
  toast.textContent=defRef+' raised ✓';
  toast.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--danger);color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;z-index:9999;font-weight:600';
  document.body.appendChild(toast);
  setTimeout(function(){if(document.body.contains(toast))document.body.removeChild(toast);},2500);
}
</script>
