.sb.sm .sb-group-items{display:block !important}.sb.sm .sb-item{padding:9px 14px;justify-content:center;border-left:none;overflow:visible}

/* DETAIL */
.detail-topbar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}

.layer-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1px solid var(--border);cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;background:transparent;color:var(--text2);transition:all .15s;white-space:nowrap}
.layer-btn:hover{border-color:var(--muted);color:var(--text)}.layer-btn.on{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.layer-btn.itp.on{border-color:var(--purple);color:var(--purple);background:var(--purple-dim)}
.layer-btn.defect.on{border-color:var(--danger);color:var(--danger);background:var(--danger-dim)}
.layer-btn.fire.on{border-color:var(--warn);color:var(--warn);background:var(--warn-dim)}
.vdiv{width:1px;height:20px;background:var(--border);flex-shrink:0}
.zoom-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .13s;position:relative;flex-shrink:0}
.zoom-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.zoom-btn .ztip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);font-size:11px;padding:3px 8px;border-radius:5px;border:1px solid var(--border);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:500;font-family:'DM Sans',sans-serif}
.zoom-btn:hover .ztip{opacity:1}
.drawing-area{flex:1;display:flex;overflow:hidden;position:relative}
/* pdf-wrap: no scrollbars — pan/zoom via CSS transform only */
.pdf-wrap{flex:1;overflow:hidden;background:#111420;position:relative;cursor:grab}
.pdf-wrap.pin-mode{cursor:crosshair}
.pdf-wrap.panning{cursor:grabbing}
.pdf-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#111420;z-index:30;pointer-events:none}
.pdf-loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.pdf-loading-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1px}
@keyframes spin{to{transform:rotate(360deg)}}
/* pdf-stage: positioned absolutely so translate can go anywhere */
#pdfStage{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform;display:inline-block;transition:opacity .15s}
canvas#pdfCanvas{display:block}
.pin-overlay{position:absolute;top:0;left:0;pointer-events:none;width:100%;height:100%}
.drw-pin{position:absolute;transform:translate(-50%,-100%);pointer-events:all;cursor:pointer;display:flex;flex-direction:column;align-items:center;z-index:10;transition:transform .1s}
.drw-pin.dragging{cursor:grabbing;z-index:50;transition:none;opacity:0.8}
.drw-pin:hover{z-index:20}
.pin-marker{width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.25);box-shadow:0 2px 10px rgba(0,0,0,.6)}
.drw-pin:hover .pin-marker{transform:rotate(-45deg) scale(1.2)}
.pin-marker-inner{transform:rotate(45deg);font-size:10px;font-weight:700;font-family:'DM Mono',monospace;color:#fff;line-height:1}
.drw-pin.itp .pin-marker{background:var(--purple)}
.drw-pin.defect .pin-marker{background:var(--danger)}
.drw-pin.fire .pin-marker{background:var(--warn)}
.pin-lbl{margin-top:3px;font-family:'DM Mono',monospace;font-size:9px;font-weight:700;color:#fff;background:rgba(0,0,0,.75);padding:1px 5px;border-radius:3px;white-space:nowrap}

.pmode-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:11px;font-weight:600;transition:all .15s;background:transparent;color:var(--text2)}
.pmode-btn:hover{background:var(--surface2);color:var(--text)}
.pmode-btn.on{color:#fff}
.pmode-btn.itp.on{background:var(--purple)}

.pmode-btn.fire.on{background:var(--warn);color:#080c12}
.pmode-btn.off.on{background:var(--surface3);color:var(--text2)}

.pins-panel{width:310px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .25s;flex-shrink:0;position:relative}
.pins-panel.collapsed{width:32px}
.pins-panel.collapsed .pp-hide{display:none !important}
.pp-collapse-tab{position:absolute;top:50%;left:-1px;transform:translateY(-50%);width:16px;height:48px;background:var(--surface2);border:1px solid var(--border);border-right:none;border-radius:6px 0 0 6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:10px;transition:all .13s;z-index:5}
.pp-collapse-tab:hover{color:var(--accent);background:var(--surface3)}
.pp-hdr{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pp-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.pp-list{flex:1;overflow-y:auto;padding:6px}

.pin-item:hover{border-color:var(--muted)}
.pi-hdr{display:flex;align-items:center;gap:7px;padding:8px 11px}
.pi-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pin-item.itp .pi-dot{background:var(--purple)}.pin-item.defect .pi-dot{background:var(--danger)}.pin-item.fire .pi-dot{background:var(--warn)}
.pi-ref{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;flex-shrink:0}
.pin-item.itp .pi-ref{color:var(--purple)}.pin-item.defect .pi-ref{color:var(--danger)}.pin-item.fire .pi-ref{color:var(--warn)}
.pi-desc{flex:1;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.st-open{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(255,77,109,.2)}

.pi-body{display:none;padding:0 11px 11px;border-top:1px solid var(--border)}
.pin-item.exp .pi-body{display:block}
.itp-cl{margin-top:9px}

.itp-ci:last-child{border-bottom:none}
.ci-chk{width:15px;height:15px;border:1.5px solid var(--border);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .15s}
.ci-chk.on{background:var(--purple);border-color:var(--purple);color:#fff}
.ci-txt{font-size:11.5px;color:var(--text2);flex:1}
.ci-txt.done{color:var(--muted);text-decoration:line-through}
.pi-field{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 8px;outline:none;margin-top:7px;transition:border-color .15s}
.pi-field:focus{border-color:var(--accent)}.pi-field::placeholder{color:var(--muted)}
.pi-sel{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:5px 8px;outline:none;margin-top:7px;cursor:pointer}
.pi-sel:focus{border-color:var(--accent)}.pi-sel option{background:var(--surface2)}
.pi-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0;margin-top:8px;transition:color .13s;display:block}
.pi-del:hover{color:var(--danger)}
.no-pdf{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;color:var(--muted)}
.no-pdf-icon{font-size:48px;opacity:.3}

function _doFitAndShow(canvas,vpW,vpH){

function renderPdfData(dataUrl,drawingId){
  if(_renderTask){try{_renderTask.cancel();}catch(e){}_renderTask=null;}
  function doRender(pdf){
    pdfDoc=pdf;
    pdf.getPage(1).then(function(page){
      var vpFast=page.getViewport({scale:PDF_FAST_RES});
      var fast=document.createElement('canvas');
      fast.width=vpFast.width;fast.height=vpFast.height;
      page.render({canvasContext:fast.getContext('2d'),viewport:vpFast}).promise.then(function(){
        var canvas=document.getElementById('pdfCanvas');
        canvas.width=fast.width;canvas.height=fast.height;
        canvas.getContext('2d').drawImage(fast,0,0);
        canvas.style.display='block';canvas.onclick=onCanvasClick;
        var loader=document.getElementById('pdfLoading');if(loader)loader.style.display='none';
        requestAnimationFrame(function(){_doFitAndShow(canvas,vpFast.width,vpFast.height);});
        var vpHi=page.getViewport({scale:PDF_BASE_RES});
        var hi=document.createElement('canvas');hi.width=vpHi.width;hi.height=vpHi.height;
        _renderTask=page.render({canvasContext:hi.getContext('2d'),viewport:vpHi});
        _renderTask.promise.then(function(){
          _renderTask=null;if(drawingId&&curId!==drawingId)return;
          canvas.width=vpHi.width;canvas.height=vpHi.height;
          canvas.getContext('2d').drawImage(hi,0,0);
          requestAnimationFrame(function(){_doFitAndShow(canvas,vpHi.width,vpHi.height);});
        }).catch(function(){});
      });
    });
  }
  if(drawingId&&_pdfCache[drawingId]){doRender(_pdfCache[drawingId]);return;}
  try{
    var blob=new Blob([Uint8Array.from(atob(dataUrl.split(',')[1]),function(c){return c.charCodeAt(0);})],{type:'application/pdf'});
    blob.arrayBuffer().then(function(buf){
      pdfjsLib.getDocument({data:new Uint8Array(buf)}).promise.then(function(pdf){
        if(drawingId)_pdfCache[drawingId]=pdf;doRender(pdf);
      });
    });
  }catch(e){
    var b64=dataUrl.split(',')[1];var bin=atob(b64);var arr=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    pdfjsLib.getDocument({data:arr}).promise.then(function(pdf){
      if(drawingId)_pdfCache[drawingId]=pdf;doRender(pdf);
    }).catch(function(err){console.error('PDF error:',err);});
  }
}

    pdfDoc=pdf;if(_pdfCache)_pdfCache[drawingId]=pdf;

      var vpFast=page.getViewport({scale:PDF_FAST_RES});
      var fast=document.createElement('canvas');fast.width=vpFast.width;fast.height=vpFast.height;

        canvas.getContext('2d').drawImage(fast,0,0);
        canvas.style.display='block';canvas.onclick=onCanvasClick;
        if(loader)loader.style.display='none';

function _centreStage(){
  var wrap=document.getElementById('pdfWrap');
  var canvas=document.getElementById('pdfCanvas');if(!canvas||!canvas.width)return;
  var ww=wrap.offsetWidth||800,wh=wrap.offsetHeight||600;

}
function _zoomAt(mx,my,newScale){
  newScale=Math.max(0.1,Math.min(6,parseFloat(newScale.toFixed(2))));
  var ratio=newScale/pdfScale;
  _panX=mx-(mx-_panX)*ratio;_panY=my-(my-_panY)*ratio;
  pdfScale=newScale;applyZoom();
}
function zoomIn(){var wrap=document.getElementById('pdfWrap');_zoomAt(wrap.clientWidth/2,wrap.clientHeight/2,pdfScale+0.15);}

// Click-and-drag pan — works in all 4 directions with no boundary
(function(){
  var wrap=document.getElementById('pdfWrap');
  var _dragging=false,_startX=0,_startY=0,_startPanX=0,_startPanY=0,_moved=false;
  wrap.addEventListener('mousedown',function(e){
    if(e.button!==0)return;
    if(pinMode)return; // pin mode: let canvas click handler deal with it
    _dragging=true;_moved=false;
    _startX=e.clientX;_startY=e.clientY;
    _startPanX=_panX;_startPanY=_panY;
    wrap.classList.add('panning');
  });
  window.addEventListener('mousemove',function(e){
    if(!_dragging)return;
    var dx=e.clientX-_startX;
    var dy=e.clientY-_startY;
    if(Math.abs(dx)>3||Math.abs(dy)>3)_moved=true;
    _panX=_startPanX+dx;
    _panY=_startPanY+dy;
    var stage=document.getElementById('pdfStage');
    stage.style.transform='translate('+_panX+'px,'+_panY+'px) scale('+pdfScale+')';
  });
  window.addEventListener('mouseup',function(e){
    if(!_dragging)return;
    _dragging=false;
    wrap.classList.remove('panning');
    if(!_moved&&e.target===document.getElementById('pdfCanvas')&&pinMode){
      onCanvasClick(e);
    }
    if(_moved) renderPinOverlay();
  });

  // Touch pan & pinch zoom
  var _t1=null,_t2=null,_tPanX=0,_tPanY=0,_tScale=1,_tDist=0;
  wrap.addEventListener('touchstart',function(e){
    if(e.touches.length===1){
      _t1=e.touches[0];_t2=null;
      _tPanX=_panX;_tPanY=_panY;
    } else if(e.touches.length===2){
      _t1=e.touches[0];_t2=e.touches[1];
      _tScale=pdfScale;_tPanX=_panX;_tPanY=_panY;
      _tDist=Math.hypot(_t2.clientX-_t1.clientX,_t2.clientY-_t1.clientY);
      e.preventDefault();
    }
  },{passive:false});
  wrap.addEventListener('touchmove',function(e){
    if(e.touches.length===1&&_t1&&!_t2){
      var dx=e.touches[0].clientX-_t1.clientX;
      var dy=e.touches[0].clientY-_t1.clientY;
      _panX=_tPanX+dx;_panY=_tPanY+dy;
      var stage=document.getElementById('pdfStage');
      stage.style.transform='translate('+_panX+'px,'+_panY+'px) scale('+pdfScale+')';
    } else if(e.touches.length===2&&_t1&&_t2){
      var d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
      var newScale=Math.max(0.1,Math.min(6,_tScale*(d/_tDist)));
      var midX=(e.touches[0].clientX+e.touches[1].clientX)/2-wrap.getBoundingClientRect().left;
      var midY=(e.touches[0].clientY+e.touches[1].clientY)/2-wrap.getBoundingClientRect().top;
      var ratio=newScale/_tScale;
      _panX=midX-(_tPanX===0?midX:(midX-_tPanX))*ratio;
      _panY=midY-(_tPanY===0?midY:(midY-_tPanY))*ratio;
      pdfScale=newScale;
      var stage=document.getElementById('pdfStage');
      stage.style.transform='translate('+_panX+'px,'+_panY+'px) scale('+pdfScale+')';
      e.preventDefault();
    }
  },{passive:false});
  wrap.addEventListener('touchend',function(){renderPinOverlay();});
})();

// ── PIN OVERLAY ──
// Pins are placed at % of the CANVAS (unscaled) — CSS scale handles visual position
function renderPinOverlay(){
  var overlay=document.getElementById('pinOverlay');overlay.innerHTML='';
  var d=drawings.find(function(x){return x.id===curId;});if(!d||!d.pins) return;
  var canvas=document.getElementById('pdfCanvas');
  if(!canvas||canvas.style.display==='none') return;
  var cw=canvas.width,ch=canvas.height; // use intrinsic pixel size, not CSS size
  // Calculate offsets for overlapping pins
  var visiblePins=d.pins.filter(function(p){return activeLayer==='all'||p.type===activeLayer;});
  var THRESH=32; // pixels — pins within this distance get offset
  var offsets={}; // pinId -> {dx, dy}
  // First pass: find all overlap groups
  var processed={};
  visiblePins.forEach(function(pin,i){
    if(processed[pin.id])return;
    var px=pin.x/100*cw, py=pin.y/100*ch;
    // Find all pins (including self) within threshold
    var group=visiblePins.filter(function(p2){
      var dx=p2.x/100*cw-px, dy=p2.y/100*ch-py;
      return Math.sqrt(dx*dx+dy*dy)<THRESH;
    });
    if(group.length===1){
      // No overlap — no offset
      offsets[pin.id]={dx:0,dy:0};
    } else {
      // Spread all pins in group evenly around a circle
      var radius=group.length===2?16:22;
      group.forEach(function(p2,idx){
        var angle=(idx/group.length)*2*Math.PI - Math.PI/2;
        offsets[p2.id]={dx:Math.cos(angle)*radius, dy:Math.sin(angle)*radius};
        processed[p2.id]=true;
      });
    }
    processed[pin.id]=true;
  });

  visiblePins.forEach(function(pin){
    var off=offsets[pin.id]||{dx:0,dy:0};
    var el=document.createElement('div');el.className='drw-pin '+pin.type;
    el.style.left=((pin.x/100*cw)+off.dx)+'px';
    el.style.top=((pin.y/100*ch)+off.dy)+'px';
    var m=document.createElement('div');m.className='pin-marker';
    var inner=document.createElement('div');inner.className='pin-marker-inner';
    inner.textContent=(pin.ref||'').replace(/[A-Z]+-/,'');
    m.appendChild(inner);
    var lbl=document.createElement('div');lbl.className='pin-lbl';lbl.textContent=pin.ref||'';
    el.appendChild(m);el.appendChild(lbl);
    (function(p){
      el.addEventListener('click',function(e){
        e.stopPropagation();
        if(p.type==='itp'){
          var base=window.location.href.substring(0,window.location.href.lastIndexOf('/')+1);
          window.open(base+'hvac-itp-form.html?drawingId='+curId+'&pinId='+p.id,'_blank');
        } else {
          document.getElementById('pinsPanel').classList.remove('collapsed');expandPin(p.id);
        }
      });
    })(pin);
    overlay.appendChild(el);
  });
}

  else if(mode==='defect'){document.getElementById('pmDef').classList.add('on');}
  else if(mode==='fire'){document.getElementById('pmFire').classList.add('on');}
  else{document.getElementById('pmOff').classList.add('on');}
  var hint=document.getElementById('pinModeHint');
  if(hint) hint.textContent=mode?'Click anywhere on the drawing to place pin':'';
}

var _pendingPos=null,_pendingClItems=[];

function onCanvasClick(e){
  if(!curId)return;
  var canvas=document.getElementById('pdfCanvas');
  if(!canvas)return;
  var rect=canvas.getBoundingClientRect();
  var px=((e.clientX-rect.left)/rect.width)*100;
  var py=((e.clientY-rect.top)/rect.height)*100;
  if(px<0||px>100||py<0||py>100)return;

  // Move pin mode takes priority
  if(_movingPin){
    var d=drawings.find(function(x){return x.id===curId;});if(!d)return;
    var pin=d.pins&&d.pins.find(function(p){return p.id===_movingPin.id;});
    if(pin){
      pin.x=Math.round(px*10)/10;
      pin.y=Math.round(py*10)/10;
      save();renderPins();renderPinOverlay();
      showToast('✓ Pin moved');
    }
    cancelMovePin();
    return;
  }

  if(!pinMode)return;
  _pendingPos={x:Math.round(px*10)/10,y:Math.round(py*10)/10};
  openPinModal(pinMode);
}

// Attach click to wrap so it fires regardless of what child is clicked
document.getElementById('pdfWrap').addEventListener('click',function(e){
  if(!pinMode)return;
  onCanvasClick(e);
});

document.getElementById('pdfWrap').addEventListener('contextmenu',function(e){
  var pinEl=e.target.closest('.drw-pin');
  if(!pinEl)return; // let browser handle right-click on non-pin areas
  e.preventDefault();
  e.stopPropagation();
  var d=drawings.find(function(x){return x.id===curId;});if(!d||!d.pins)return;
  var lbl=pinEl.querySelector('.pin-lbl');if(!lbl)return;
  var ref=lbl.textContent;
  var pin=d.pins.find(function(p){return p.ref===ref;});
  if(pin)showPinContextMenu(e,pin);
});

function openPinModal(type){
  if(type==='itp'){
    document.getElementById('itp-ref').value=nextRef('itp');
    document.getElementById('itp-desc').value='';

    if(itpSub)itpSub.textContent='Position: '+_pendingPos.x+'%, '+_pendingPos.y+'%';
    document.getElementById('itpModal').classList.add('open');
    setTimeout(function(){document.getElementById('itp-desc').focus();},80);

    document.getElementById('def-ref').value=nextRef('defect');
    document.getElementById('def-desc').value='';
    document.getElementById('def-status').value='open';

    document.getElementById('fire-ref').value=nextRef('fire');

    document.getElementById('fire-status').value='open';
    var fireSub=document.getElementById('fireSub');

  }
}

function renderClEditor(){
  var ed=document.getElementById('itpClEditor');ed.innerHTML='';
  if(!_pendingClItems.length){ed.innerHTML='<div style="color:var(--muted);font-size:12px;padding:2px">No items — click ＋ Add checklist item below</div>';return;}
  _pendingClItems.forEach(function(item,i){
    var row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)';
    var inp=document.createElement('input');inp.type='text';inp.value=item.text;inp.placeholder='Checklist item…';
    inp.style.cssText='flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:DM Sans,sans-serif;font-size:12px';

function cancelPin(){
  ['itpModal','defectModal','fireModal'].forEach(function(id){document.getElementById(id).classList.remove('open');});
  _pendingPos=null;
}

function confirmPin(type, addAnother){
  if(!_pendingPos||!curId) return;
  var d=drawings.find(function(x){return x.id===curId;});if(!d)return;
  if(!d.pins) d.pins=[];
  var pin={id:'pin'+nid(),type:type,x:_pendingPos.x,y:_pendingPos.y};
  if(type==='itp'){
    var desc=document.getElementById('itp-desc').value.trim();
    if(!desc){alert('Description required.');return;}
    pin.ref=document.getElementById('itp-ref').value;
    pin.desc=desc;
    pin.equip=document.getElementById('itp-equip').value.trim();
    pin.status=document.getElementById('itp-status').value;
    pin.checklist=_pendingClItems.filter(function(i){return i.text.trim();}).map(function(i){return{text:i.text.trim(),checked:false};});
    document.getElementById('itpModal').classList.remove('open');
  } else if(type==='defect'){
    var desc=document.getElementById('def-desc').value.trim();
    if(!desc){alert('Description required.');return;}
    pin.ref=document.getElementById('def-ref').value;pin.desc=desc;pin.status=document.getElementById('def-status').value;
    document.getElementById('defectModal').classList.remove('open');
    // Also create defect record in defects table and open form
    (async function(defRef, defDesc, pinId, drawingId, px, py){
      var pNum=(dbGetCurrentProject()||{}).num||'GCT001';
      var u=dbGetCurrentUser();
      var existing=await dbGetProject('defects',pNum)||[];
      if(!Array.isArray(existing))existing=[];
      var defObj={
        id:'def_'+Date.now(),
        ref:defRef,
        status:'open',
        desc:defDesc,
        priority:'medium',
        drawingId:drawingId,
        pinX:px,
        pinY:py,
        raisedBy:u?(u.name||u.username||''):'',
        issueDate:new Date().toISOString().split('T')[0],
        photos:[],closePhotos:[],
        createdAt:new Date().toISOString()
      };
      existing.push(defObj);
      await dbSetProject('defects',pNum,existing);
      // Open defect form to fill in full details
      var b=window.location.href.substring(0,window.location.href.lastIndexOf('/')+1);
      window.open(b+'hvac-defect-form.html?id='+encodeURIComponent(defObj.id),'_blank');
    })(pin.ref, pin.desc, pin.id, curId, _pendingPos.x, _pendingPos.y);
  } else if(type==='fire'){
    var desc=document.getElementById('fire-desc').value.trim();
    if(!desc){alert('Description required.');return;}
    pin.ref=document.getElementById('fire-ref').value;pin.desc=desc;pin.status=document.getElementById('fire-status').value;
    document.getElementById('fireModal').classList.remove('open');
  }
  d.pins.push(pin);
  _pendingPos=null;
  save();renderPins();renderPinOverlay();
  document.getElementById('pinCount').textContent=d.pins.length;
  document.getElementById('pinsPanel').classList.remove('collapsed');
  if(addAnother){
    // Re-activate pin mode so user can immediately place next pin
    showToast('Pin saved — click on drawing to place next pin');
    setPinMode(type);
  }
}

// ── PIN OVERLAY ──
function renderPinOverlay(){
  var overlay=document.getElementById('pinOverlay');overlay.innerHTML='';
  var d=drawings.find(function(x){return x.id===curId;});if(!d||!d.pins) return;
  var canvas=document.getElementById('pdfCanvas');
  if(!canvas||canvas.style.display==='none') return;
  var cw=canvas.offsetWidth,ch=canvas.offsetHeight;
  d.pins.forEach(function(pin){
    if(activeLayer!=='all'&&pin.type!==activeLayer) return;
    var el=document.createElement('div');el.className='drw-pin '+pin.type;
    el.style.left=(pin.x/100*cw)+'px';
    el.style.top=(pin.y/100*ch)+'px';
    var m=document.createElement('div');m.className='pin-marker';
    var inner=document.createElement('div');inner.className='pin-marker-inner';
    inner.textContent=(pin.ref||'').replace(/[A-Z]+-/,'');
    m.appendChild(inner);
    var lbl=document.createElement('div');lbl.className='pin-lbl';lbl.textContent=pin.ref||'';
    el.appendChild(m);el.appendChild(lbl);
    (function(p){el.addEventListener('click',function(e){e.stopPropagation();document.getElementById('pinsPanel').classList.remove('collapsed');expandPin(p.id);});})(pin);
    overlay.appendChild(el);
  });
}

// ── PINS PANEL ──
function togglePinsPanel(){document.getElementById('pinsPanel').classList.toggle('collapsed');var tab=document.getElementById('ppCollapseTab');if(tab)tab.textContent=document.getElementById('pinsPanel').classList.contains('collapsed')?'▶':'◀';}

function renderPins(){
  var d=drawings.find(function(x){return x.id===curId;});
  var list=document.getElementById('ppList');
  var tf=(document.getElementById('pinTypeFilter').value||'');
  list.innerHTML='';
  var pins=(d&&d.pins)||[];
  var filtered=pins.filter(function(p){return!tf||p.type===tf;});
  document.getElementById('pinCount').textContent=pins.length;
  if(!filtered.length){
    list.innerHTML='<div style="text-align:center;padding:28px;color:var(--muted);font-size:12px">'+(pins.length?'No pins match filter':'Select pin type then click on drawing')+'</div>';
    return;
  }
  filtered.forEach(function(pin){
    var item=document.createElement('div');item.className='pin-item '+pin.type;item.id='pi-'+pin.id;
    var stcls={open:'st-open',inprogress:'st-inprogress',closed:'st-closed'}[pin.status]||'st-open';
    var stlbl={open:'Open',inprogress:'In Progress',closed:'Closed'}[pin.status]||'Open';
    var hdr=document.createElement('div');hdr.className='pi-hdr';
    hdr.innerHTML='<div class="pi-dot"></div><span class="pi-ref">'+escH(pin.ref||'')+'</span><span class="pi-desc" title="'+escH(pin.desc||'')+'">'+escH(pin.desc||'')+'</span><span class="pi-st '+stcls+'">'+stlbl+'</span>';
    (function(p){hdr.addEventListener('click',function(){expandPin(p.id);});})(pin);
    var body=document.createElement('div');body.className='pi-body';
    if(pin.equip){var eq=document.createElement('div');eq.style.cssText='font-family:DM Mono,monospace;font-size:10px;color:var(--accent);margin-top:8px';eq.textContent='Equipment: '+pin.equip;body.appendChild(eq);}
    // ITP Checklist
    if(pin.type==='itp'&&pin.checklist&&pin.checklist.length){
      var cl=document.createElement('div');cl.className='itp-cl';
      pin.checklist.forEach(function(ci,ci_i){
        var row=document.createElement('div');row.className='itp-ci';
        var chk=document.createElement('div');chk.className='ci-chk'+(ci.checked?' on':'');if(ci.checked)chk.textContent='✓';
        (function(p2,idx,c2){chk.addEventListener('click',function(e){e.stopPropagation();p2.checklist[idx].checked=!p2.checklist[idx].checked;c2.className='ci-chk'+(p2.checklist[idx].checked?' on':'');c2.textContent=p2.checklist[idx].checked?'✓':'';save();});})(pin,ci_i,chk);
        var txt=document.createElement('span');txt.className='ci-txt'+(ci.checked?' done':'');txt.textContent=ci.text;
        row.appendChild(chk);row.appendChild(txt);cl.appendChild(row);
      });
      body.appendChild(cl);
    }
    // Status select
    var ss=document.createElement('select');ss.className='pi-sel';
    [{v:'open',l:'Open'},{v:'inprogress',l:'In Progress'},{v:'closed',l:'Closed'}].forEach(function(opt){var o=document.createElement('option');o.value=opt.v;o.textContent=opt.l;if(opt.v===pin.status)o.selected=true;ss.appendChild(o);});
    (function(p){ss.addEventListener('change',function(){p.status=this.value;save();renderPins();renderPinOverlay();});})(pin);
    body.appendChild(ss);
    // Delete
    var del=document.createElement('button');del.className='pi-del';del.textContent='🗑 Delete pin';
    (function(p){del.addEventListener('click',function(e){e.stopPropagation();if(!confirm('Delete this pin?'))return;var d=drawings.find(function(x){return x.id===curId;});if(d){d.pins=d.pins.filter(function(x){return x.id!==p.id;});save();renderPins();renderPinOverlay();}});})(pin);
    body.appendChild(del);
    item.appendChild(hdr);item.appendChild(body);list.appendChild(item);
  });
}

function expandPin(pinId){
  document.querySelectorAll('.pin-item').forEach(function(el){el.classList.toggle('exp',el.id==='pi-'+pinId&&!el.classList.contains('exp'));});
  var el=document.getElementById('pi-'+pinId);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
}
