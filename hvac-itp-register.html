<style>
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex}

/* SIDEBAR */
.sb{width:230px;position:fixed;top:0;left:0;bottom:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:300;transition:width .25s;overflow:hidden}
.sb.sm{width:52px}
.sb-top{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-brand{display:flex;align-items:center;gap:9px;overflow:hidden}.sb-icon{font-size:20px;flex-shrink:0}.sb-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--text);white-space:nowrap}
.sb-toggle{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.sb-proj-block{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}.sb-proj-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}.sb-proj-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.sb-proj-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;scrollbar-width:thin}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--text2);font-size:13px;border-left:3px solid transparent;text-decoration:none}.sb-item:hover{background:var(--surface2);color:var(--text)}.sb-item.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent)}
.sb-item-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}.sb-item-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sb-group-hdr{display:flex;align-items:center;gap:8px;padding:7px 16px 4px;cursor:pointer;user-select:none}.sb-group-hdr:hover{background:var(--surface2)}
.sb-group-chev{font-size:10px;color:var(--muted);width:10px}.sb-group-name{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.sb-group-items .sb-item{padding-left:28px}
.sb.sm .sb-name,.sb.sm .sb-proj-block,.sb.sm .sb-group-hdr,.sb.sm .sb-item-label,.sb.sm .sb-user-name{display:none}
.sb-footer{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px}.sb-user-name{font-size:12.5px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-resize-handle{position:absolute;top:0;right:-4px;width:8px;height:100%;cursor:col-resize;z-index:400;background:transparent}

/* MAIN */
.main{position:fixed;top:0;left:230px;right:0;bottom:0;display:flex;flex-direction:column;transition:left .25s}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0;background:var(--surface)}
.bc{display:flex;align-items:center;gap:6px;flex:1;min-width:0;font-size:13px}
.bcl{color:var(--text2);cursor:pointer;white-space:nowrap}.bcl:hover{color:var(--accent)}
.bcs{color:var(--muted)}.bcc{color:var(--text);font-weight:600;white-space:nowrap}
.btn{border:none;border-radius:7px;padding:7px 14px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:6px}
.bp{background:var(--accent);color:#000}.bg{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.bsm{padding:5px 12px;font-size:12px}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:20px 24px}

/* STATS */
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;flex-direction:column;gap:4px;min-width:120px}
.stat-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800}
.stat-lbl{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px}

/* FILTERS */
.filter-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fi{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.fi:focus{border-color:var(--accent)}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 12px;flex:1;min-width:200px;max-width:320px}
.search-box input{background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%}

/* TABLE */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:var(--surface2);padding:10px 14px;text-align:left;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface2);cursor:pointer}
.tbl tr.deleted td{opacity:0.45}
.mono{font-family:'DM Mono',monospace;font-size:12px}
.ref{color:var(--accent);font-family:'DM Mono',monospace;font-size:12px;font-weight:600}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;white-space:nowrap}
.badge-ns{background:rgba(74,90,122,.3);color:var(--muted)}
.badge-ip{background:rgba(255,170,0,.15);color:var(--warn)}
.badge-act{background:rgba(255,77,109,.15);color:var(--danger)}
.badge-cl{background:rgba(0,214,143,.15);color:var(--green)}
.badge-del{background:rgba(255,77,109,.1);color:var(--danger);border:1px solid rgba(255,77,109,.3)}
.empty{padding:60px;text-align:center;color:var(--muted);font-size:14px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(4,8,16,.82);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.mo.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;width:520px;max-width:96vw;max-height:90vh}
.modal-hdr{padding:16px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-hdr h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:800}
.modal-body{overflow-y:auto;flex:1;padding:14px 18px;display:flex;flex-direction:column;gap:12px}
.modal-footer{padding:10px 18px;border-top:1px solid var(--border);display:flex;gap:7px;justify-content:flex-end;flex-shrink:0}
.ml{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.mi{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none}
.mi:focus{border-color:var(--accent)}
select.mi{height:36px;appearance:auto}
</style>

<script>
var proj=dbGetCurrentProject();
var pNum=proj.num||proj.number||'GCT001';
var SBK='hvacnexus_sb_collapsed';

var allItps=[]; // {ref, formNo, itpType, equip, docNo, building, location, subLocation, status, drawingId, drawingNum, pinId, raisedBy, raisedDate, deleted, responses}
var templates=[];

function navTo(url){var b=window.location.href.substring(0,window.location.href.lastIndexOf('/')+1);window.location.href=b+url;}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){if(!d)return '—';var p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}

// ── LOAD DATA ──
// ── COLUMNS DEFINITION ──
var COLS=[
  {key:'docNo',    label:'Client Doc No.',  def:true},
  {key:'ref',      label:'ITP No.',         def:true},
  {key:'ref',      label:'Ref No.',         def:true},
  {key:'formNo',   label:'Form No.',        def:true},
  {key:'itpType',  label:'ITP Type',        def:true},
  {key:'equip',    label:'Equipment ID',    def:true},
  {key:'building', label:'Building',        def:true},
  {key:'location', label:'Location',        def:true},
  {key:'subLocation',label:'Sub Location',  def:true},
  {key:'status',   label:'Status',          def:true},
  {key:'createdBy',label:'Created By',      def:true},
];
// Load column visibility from localStorage
var _colVis={};
try{_colVis=JSON.parse(localStorage.getItem('hvacnexus_reg_cols')||'{}');}catch(e){}
COLS.forEach(function(c){if(_colVis[c.label]===undefined)_colVis[c.label]=c.def;});

function saveColVis(){localStorage.setItem('hvacnexus_reg_cols',JSON.stringify(_colVis));}
function visibleCols(){return COLS.filter(function(c){return _colVis[c.label];});}

function renderColHeaders(){
  var tr=document.getElementById('tblHead');
  tr.innerHTML=visibleCols().map(function(c){return '<th>'+escH(c.label)+'</th>';}).join('');
}

// ── EQUIPMENT SCHEDULE CACHE ──
var _equipSchedule=null;
async function getEquipSchedule(){
  if(_equipSchedule)return _equipSchedule;
  try{_equipSchedule=await dbGetEquipment(pNum)||null;}catch(e){_equipSchedule=null;}
  return _equipSchedule;
}
function lookupEquip(equipId){
  if(!equipId||!_equipSchedule||!_equipSchedule.tabs)return null;
  for(var i=0;i<_equipSchedule.tabs.length;i++){
    var tab=_equipSchedule.tabs[i];
    for(var j=0;j<(tab.rows||[]).length;j++){
      var r=tab.rows[j];
      if((r.tag||r.equipId||'').toLowerCase()===equipId.toLowerCase())return r;
    }
  }
  return null;
}

async function loadAll(){
  var results=await Promise.all([
    dbGetDrawings(pNum).catch(function(){return [];}),
    dbGetItpResponses(pNum).catch(function(){return {};}),
    dbGetItpProjectTemplates(pNum).catch(function(){return [];}),
    getEquipSchedule()
  ]);
  var drawings=results[0]||[];
  var responses=results[1]||{};
  templates=results[2]||[];

  allItps=[];
  drawings.forEach(function(drw){
    (drw.pins||[]).filter(function(p){return p.type==='itp';}).forEach(function(pin){
      var resp=responses[pin.id]||{};
      var equipId=resp.equipId||pin.equip||'';
      var eq=lookupEquip(equipId);
      var building=resp.locBuilding||(eq&&(eq.building||eq.floor||eq.level||''))||'';
      var location=resp.locLocation||(eq&&(eq.location||eq.room||''))||'';
      var subLocation=resp.locSubLocation||(eq&&(eq.sublocation||eq.subLocation||''))||'';

      // Expand cluster pins — one entry per ITP in the itps array
      var itpEntries=pin.itps&&pin.itps.length?pin.itps:[{ref:pin.ref,itpType:pin.itpTypeLabel||'',itpNo:''}];
      itpEntries.forEach(function(itp){
        var tmpl=templates.find(function(t){return t.itpNo===itp.itpNo||t.itpType===itp.itpType;});
        allItps.push({
          ref:itp.ref||pin.ref||'',
          formNo:tmpl?tmpl.itpNo:(itp.itpNo||'—'),
          itpType:itp.itpType||pin.itpTypeLabel||'',
          equip:equipId,
          docNo:resp.docNo||'',
          building:building,
          location:location,
          subLocation:subLocation,
          status:resp.status||'not-started',
          drawingId:drw.id,
          pinId:pin.id,
          itpNo:itp.itpNo||'',
          createdBy:resp.raisedBy||'',
          deleted:resp.deleted||false,
          deletedBy:resp.deletedBy||'',
          deletedDate:resp.deletedDate||''
        });
      });
    });
  });

  allItps.sort(function(a,b){
    var an=parseInt((a.ref||'').replace(/[^0-9]/g,''))||0;
    var bn=parseInt((b.ref||'').replace(/[^0-9]/g,''))||0;
    return an-bn;
  });

  var types=[...new Set(allItps.map(function(i){return i.itpType;}).filter(Boolean))].sort();
  var filtType=document.getElementById('filtType');
  filtType.innerHTML='<option value="">All ITP types</option>'+types.map(function(t){return '<option value="'+escH(t)+'">'+escH(t)+'</option>';}).join('');

  renderColHeaders();
  render(); // render calls renderStats with filtered data
}

function renderStats(filtered){
  // Use filtered data if provided, else all live ITPs
  var live=filtered?filtered.filter(function(i){return !i.deleted;}):allItps.filter(function(i){return !i.deleted;});
  var segments=[
    {key:'not-started', lbl:'Not Started', col:'#4a5a7a'},
    {key:'in-progress',  lbl:'In Progress', col:'#ffb830'},
    {key:'action',       lbl:'Action Req.', col:'#ff4d6d'},
    {key:'closed',       lbl:'Closed',      col:'#00e5a0'},
  ];
  segments.forEach(function(s){s.val=live.filter(function(i){return i.status===s.key;}).length;});
  var total=live.length;

  // Stat cards
  var allStats=[{val:total,lbl:'Total',col:'var(--accent)'}].concat(segments.map(function(s){return {val:s.val,lbl:s.lbl,col:s.col};}));
  document.getElementById('statsRow').innerHTML=allStats.map(function(s){
    return '<div class="stat-card"><div class="stat-val" style="color:'+s.col+'">'+s.val+'</div><div class="stat-lbl">'+s.lbl+'</div></div>';
  }).join('');

  // Donut chart
  var canvas=document.getElementById('donutChart');
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,120,120);
  var cx=60,cy=60,r=50,ir=32,start=-Math.PI/2;
  if(total===0){
    ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);
    ctx.strokeStyle='#1e3050';ctx.lineWidth=18;ctx.stroke();
  } else {
    segments.forEach(function(s){
      if(!s.val)return;
      var angle=(s.val/total)*2*Math.PI;
      ctx.beginPath();ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,start,start+angle);
      ctx.closePath();ctx.fillStyle=s.col;ctx.fill();
      // Inner hole
      ctx.beginPath();ctx.arc(cx,cy,ir,0,2*Math.PI);
      ctx.fillStyle='#0e1520';ctx.fill();
      start+=angle;
    });
  }
  // Centre total
  ctx.fillStyle='#ddeeff';ctx.font='bold 20px Syne,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(total,cx,cy-6);
  ctx.font='9px DM Mono,monospace';ctx.fillStyle='#4a5a7a';
  ctx.fillText('TOTAL',cx,cy+10);

  // Legend
  document.getElementById('donutLegend').innerHTML=segments.map(function(s){
    var pct=total?Math.round(s.val/total*100):0;
    return '<div style="display:flex;align-items:center;gap:6px">'
      +'<div style="width:10px;height:10px;border-radius:2px;background:'+s.col+';flex-shrink:0"></div>'
      +'<span style="color:var(--text2)">'+s.lbl+'</span>'
      +'<span style="font-family:DM Mono,monospace;color:var(--muted);margin-left:auto;padding-left:12px">'+s.val+' ('+pct+'%)</span>'
      +'</div>';
  }).join('');
}

function render(){
  var q=(document.getElementById('srch').value||'').toLowerCase();
  var fStatus=document.getElementById('filtStatus').value;
  var fType=document.getElementById('filtType').value;
  var showDel=document.getElementById('showDeleted').checked;

  var filtered=allItps.filter(function(i){
    if(!showDel&&i.deleted)return false;
    if(fStatus&&i.status!==fStatus)return false;
    if(fType&&i.itpType!==fType)return false;
    if(q){
      var hay=(i.ref+' '+i.itpType+' '+i.equip+' '+i.docNo+' '+i.building+' '+i.location).toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  });

  var BADGE={
    'not-started':'badge-ns','in-progress':'badge-ip',
    'action':'badge-act','closed':'badge-cl'
  };
  var STATUS_LBL={'not-started':'Not Started','in-progress':'In Progress','action':'Action Req.','closed':'Closed'};

  var vcols=visibleCols();
  var tbody=document.getElementById('tblBody');
  tbody.innerHTML=filtered.map(function(itp){
    var badgeCls=itp.deleted?'badge-del':(BADGE[itp.status]||'badge-ns');
    var statusLbl=itp.deleted?'Deleted':(STATUS_LBL[itp.status]||itp.status);
    var cells=vcols.map(function(c){
      var v='—';
      if(c.key==='ref')v=itp.ref||'—';
      else if(c.key==='formNo')v=itp.formNo||'—';
      else if(c.key==='itpType')v=itp.itpType||'—';
      else if(c.key==='equip')v=itp.equip||'—';
      else if(c.key==='docNo')v=itp.docNo||'—';
      else if(c.key==='building')v=itp.building||'—';
      else if(c.key==='location')v=itp.location||'—';
      else if(c.key==='subLocation')v=itp.subLocation||'—';
      else if(c.key==='status')return '<td><span class="badge '+badgeCls+'">'+escH(statusLbl)+'</span></td>';
      else if(c.key==='createdBy')v=itp.createdBy||'—';
      var isMono=c.key==='ref'||c.key==='formNo'||c.key==='equip';
      return '<td class="'+(isMono?'mono ref':'')+'">'+escH(v)+'</td>';
    }).join('');
    return '<tr class="'+(itp.deleted?'deleted':'')+'" onclick="openItp(\''+escH(itp.drawingId)+'\',\''+escH(itp.pinId)+'\',\''+escH(itp.itpNo||'')+'\',\''+escH(itp.ref||'')+'\')" title="'+(itp.deleted?'Deleted by '+escH(itp.deletedBy)+' on '+escH(itp.deletedDate):'Click to open ITP form')+'">'+cells+'</tr>';
  }).join('');

  document.getElementById('emptyState').style.display=filtered.length?'none':'block';
  renderStats(filtered);
}

function openItp(drawingId, pinId, itpNo, itpRef){
  if(!drawingId||!pinId)return;
  var b=window.location.href.substring(0,window.location.href.lastIndexOf('/')+1);
  var url=b+'hvac-itp-form.html?drawingId='+encodeURIComponent(drawingId)+'&pinId='+encodeURIComponent(pinId);
  if(itpNo)url+='&itpNo='+encodeURIComponent(itpNo);
  else if(itpRef)url+='&itpRef='+encodeURIComponent(itpRef);
  window.open(url,'_blank');
}

  var equipId=document.getElementById('newEquip').value.trim();
  var eq=lookupEquip(equipId);
  var info=document.getElementById('newEquipInfo');
  if(eq){
    var b=eq.building||eq.floor||eq.level||'';

    document.getElementById('newBuilding').value=b;
    document.getElementById('newLocation').value=l;
    document.getElementById('newSubLoc').value=s;

  } else if(equipId){

async function saveNewItp(){
  var itpType=document.getElementById('newItpType').value;
  if(!itpType){alert('Please select an ITP type');return;}
  var equip=document.getElementById('newEquip').value.trim();
  var docNo=document.getElementById('newDocNo').value.trim();
  var building=document.getElementById('newBuilding').value.trim();
  var location=document.getElementById('newLocation').value.trim();
  var subLoc=document.getElementById('newSubLoc').value.trim();
  var u=dbGetCurrentUser();

  // Generate ref no — find highest ITP-XXXX across all pins
  var maxSeq=0;
  allItps.forEach(function(i){
    var m=(i.ref||'').match(/^ITP-(\d+)$/);
    if(m){var n=parseInt(m[1]);if(n>maxSeq)maxSeq=n;}
  });
  var ref='ITP-'+String(maxSeq+1).padStart(4,'0');
  var pinId='pin_'+Date.now()+'_reg';

  // Find matching template for formNo
  var tmpl=templates.find(function(t){return t.itpType===itpType;});

  // Save as a standalone pin on a virtual drawing ID '_register'
  var drawings=await dbGetDrawings(pNum)||[];
  var regDrw=drawings.find(function(d){return d.id==='_register';});
  if(!regDrw){
    regDrw={id:'_register',num:'ITP Register',name:'Standalone ITPs',cat:'Register',pins:[]};
    drawings.push(regDrw);
  }
  if(!regDrw.pins)regDrw.pins=[];
  regDrw.pins.push({
    id:pinId,type:'itp',ref:ref,
    itpTypeLabel:itpType,equip:equip,
    notes:notes,itpStatus:'not-started',
    x:0,y:0
  });
  await dbSetDrawings(pNum,drawings);

  // Save initial response
  var responses=await dbGetItpResponses(pNum)||{};
  responses[pinId]={
    status:'not-started',docNo:docNo,
    locBuilding:building,locLocation:location,locSubLocation:subLoc,
    rows:{},signoffs:{},equipId:equip,
    raisedBy:u?(u.name||u.username||'Unknown'):'Unknown',
    raisedDate:todayStr()
  };
  await dbSetItpResponses(pNum,responses);

  closeAddModal();
  await loadAll();
}
