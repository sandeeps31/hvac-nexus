<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVAC NEXUS — Projects</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c12;--surface:#0e1520;--surface2:#141e2e;--surface3:#1a2640;
  --border:#1e3050;--accent:#00c8ff;--accent-dim:rgba(0,200,255,.10);
  --green:#00e5a0;--green-dim:rgba(0,229,160,.10);
  --warn:#ffb830;--warn-dim:rgba(255,184,48,.10);
  --danger:#ff4d6d;--danger-dim:rgba(255,77,109,.10);
  --text:#ddeeff;--text2:#7a9bbf;--muted:#3d5a7a;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{font-size:24px}
.brand-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.5px}
.brand-name span{color:var(--accent)}
.brand-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.main{max-width:1080px;margin:0 auto;padding:40px 24px 80px}
.page-hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px}
.page-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.page-sub{font-size:13px;color:var(--text2);margin-top:5px}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:var(--accent);color:#080c12}.btn-primary:hover{background:#33d4ff;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--muted);background:var(--surface2)}
.toolbar{display:flex;gap:10px;margin-bottom:24px;align-items:center}
.search-wrap{position:relative;flex:1;max-width:320px}
.search-wrap input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px 8px 36px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.fsel{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:12.5px;padding:8px 12px;outline:none;cursor:pointer}
.fsel:focus{border-color:var(--accent);color:var(--text)}.fsel option{background:var(--surface2)}
.count-badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;gap:14px;text-align:center}
.empty-gfx{width:80px;height:80px;border-radius:20px;background:var(--surface2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:4px}
.empty-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
.empty-sub{font-size:13px;color:var(--muted);max-width:300px;line-height:1.6}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.proj-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.proj-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:opacity .2s}
.proj-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.proj-card:hover::before{opacity:1}
.proj-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.proj-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;background:var(--accent-dim);border:1px solid rgba(0,200,255,.15);padding:3px 9px;border-radius:20px}
.proj-status{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid transparent}
.ps-active{background:var(--green-dim);color:var(--green);border-color:rgba(0,229,160,.2)}
.ps-tender{background:var(--warn-dim);color:var(--warn);border-color:rgba(255,184,48,.2)}
.ps-complete{background:var(--surface3);color:var(--muted);border-color:var(--border)}
.ps-onhold{background:var(--danger-dim);color:var(--danger);border-color:rgba(255,77,109,.2)}
.proj-name{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3}
.proj-client{font-size:12.5px;color:var(--text2);margin-bottom:14px}
.proj-meta{display:flex;gap:18px;margin-bottom:16px;flex-wrap:wrap}
.pmi{display:flex;flex-direction:column;gap:2px}
.pmi-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.pmi-val{font-size:12.5px;color:var(--text2);font-weight:500}
.proj-divider{height:1px;background:var(--border);margin-bottom:12px}
.proj-modules{display:flex;gap:5px;flex-wrap:wrap}
.mod-chip{font-family:'DM Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.proj-actions{position:absolute;top:16px;right:16px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.proj-card:hover .proj-actions{opacity:1}
.act-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s}
.act-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.act-btn.del:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-dim)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:540px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;transform:translateY(12px);transition:transform .2s}
.mo.open .modal{transform:translateY(0)}
.modal-hdr{padding:22px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-hdr h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:800}
.modal-hdr p{font-size:12px;color:var(--text2);margin-top:3px}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px}
.modal-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.ml{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block}
.mi{width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color .2s}
.mi:focus{border-color:var(--accent)}.mi::placeholder{color:var(--muted)}
.ms{width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;outline:none;cursor:pointer}
.ms:focus{border-color:var(--accent)}.ms option{background:var(--surface2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-icon">❄️</div>
    <div>
      <div class="brand-name">HVAC <span>NEXUS</span></div>
      <div class="brand-sub">Project Management Platform</div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="openCreateModal()">＋ Create Project</button>
</div>

<div class="main">
  <div class="page-hdr">
    <div>
      <div class="page-title">Projects</div>
      <div class="page-sub">Select a project to open its modules</div>
    </div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search projects…" oninput="renderProjects()">
    </div>
    <select class="fsel" id="filterStatus" onchange="renderProjects()">
      <option value="">All Statuses</option>
      <option value="Active">Active</option>
      <option value="Tender">Tender</option>
      <option value="On Hold">On Hold</option>
      <option value="Complete">Complete</option>
    </select>
    <div class="count-badge" id="countBadge"></div>
  </div>

  <div id="projectList"></div>
</div>

<!-- CREATE / EDIT MODAL -->
<div class="mo" id="projectModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modalTitle">Create Project</h3>
      <p id="modalSub">Add a new project to HVAC NEXUS</p>
    </div>
    <div class="modal-body">
      <div class="g2">
        <div><label class="ml">Project Number *</label><input class="mi" id="f-num" placeholder="e.g. PRJ-2025-001"/></div>
        <div><label class="ml">Status</label>
          <select class="ms" id="f-status">
            <option value="Active">Active</option><option value="Tender">Tender</option>
            <option value="On Hold">On Hold</option><option value="Complete">Complete</option>
          </select>
        </div>
      </div>
      <div><label class="ml">Project Name *</label><input class="mi" id="f-name" placeholder="e.g. Greenfield Commercial Tower"/></div>
      <div><label class="ml">Client / Head Contractor</label><input class="mi" id="f-client" placeholder="e.g. CPB Contractors"/></div>
      <div class="g2">
        <div><label class="ml">Contract Value</label><input class="mi" id="f-value" placeholder="e.g. $2,400,000"/></div>
        <div><label class="ml">Project Type</label>
          <select class="ms" id="f-type">
            <option>Commercial</option><option>Hospital / Healthcare</option><option>Residential</option>
            <option>Industrial</option><option>Education</option><option>Retail</option>
            <option>Government</option><option>Data Centre</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="g2">
        <div><label class="ml">Start Date</label><input class="mi" id="f-start" type="date"/></div>
        <div><label class="ml">End Date</label><input class="mi" id="f-end" type="date"/></div>
      </div>
      <div><label class="ml">Location</label><input class="mi" id="f-location" placeholder="e.g. Sydney, NSW"/></div>
      <div><label class="ml">Description (optional)</label><textarea class="mi" id="f-desc" rows="2" placeholder="Brief description…" style="resize:vertical"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveProject()" id="saveBtn">Create Project</button>
    </div>
  </div>
</div>

<script>
var SK='hvacnexus_projects';
var projects=[];
var _uid=100;
var _editingId=null;
function nid(){return 'p'+(++_uid)+Date.now();}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function save(){try{localStorage.setItem(SK,JSON.stringify(projects));}catch(e){}}
function load(){try{var s=localStorage.getItem(SK);if(s){var p=JSON.parse(s);projects=Array.isArray(p)?p:[];}}catch(e){projects=[];}}

function seedIfEmpty(){
  if(projects.length===0){
    projects.push({id:'gct001',num:'GCT001',name:'Greenfield Commercial Tower',
      client:'CPB Contractors',value:'$2,400,000',type:'Commercial',status:'Active',
      start:'2025-01-01',end:'2026-12-31',location:'Sydney, NSW',
      desc:'Multi-storey commercial tower HVAC installation.',created:'2025-01-01'});
    save();
  }
}

var ST_CLS={Active:'ps-active',Tender:'ps-tender','On Hold':'ps-onhold',Complete:'ps-complete'};
var MODS=['Drawings','Variations','Equipment','ITP','Commissioning','Procurement'];

function renderProjects(){
  var q=(document.getElementById('searchInput')||{value:''}).value.toLowerCase();
  var sf=(document.getElementById('filterStatus')||{value:''}).value;
  var list=document.getElementById('projectList');
  var tb=document.getElementById('toolbar');

  if(!projects.length){
    tb.style.display='none';
    list.innerHTML='<div class="empty">'
      +'<div class="empty-gfx">🏗️</div>'
      +'<div class="empty-title">No projects yet</div>'
      +'<div class="empty-sub">Create your first project to get started with HVAC NEXUS.</div>'
      +'<button class="btn btn-primary" onclick="openCreateModal()" style="margin-top:8px">＋ Create Project</button>'
      +'</div>';
    return;
  }
  tb.style.display='flex';
  var f=projects.filter(function(p){
    if(q&&!((p.num||'').toLowerCase().includes(q)||(p.name||'').toLowerCase().includes(q)||(p.client||'').toLowerCase().includes(q)))return false;
    if(sf&&p.status!==sf)return false;
    return true;
  });
  var cb=document.getElementById('countBadge');
  if(cb)cb.textContent=f.length+' project'+(f.length!==1?'s':'');
  if(!f.length){
    list.innerHTML='<div class="empty"><div class="empty-gfx">🔍</div><div class="empty-title">No matches</div><div class="empty-sub">Try adjusting your search or filter.</div></div>';
    return;
  }
  list.innerHTML='<div class="proj-grid">'+f.map(function(p){
    var sc=ST_CLS[p.status]||'ps-active';
    return '<div class="proj-card" id="pc-'+p.id+'">'
      +'<div class="proj-card-top"><span class="proj-id">'+escH(p.num)+'</span><span class="proj-status '+sc+'">'+escH(p.status)+'</span></div>'
      +'<div class="proj-actions" onclick="event.stopPropagation()">'
        +'<button class="act-btn" title="Edit" onclick="openEditModal(\''+p.id+'\')">✏</button>'
        +'<button class="act-btn del" title="Delete" onclick="deleteProject(\''+p.id+'\')">🗑</button>'
      +'</div>'
      +'<div class="proj-name">'+escH(p.name)+'</div>'
      +'<div class="proj-client">'+escH(p.client||'—')+'</div>'
      +'<div class="proj-meta">'
        +(p.value?'<div class="pmi"><div class="pmi-label">Value</div><div class="pmi-val">'+escH(p.value)+'</div></div>':'')
        +(p.type?'<div class="pmi"><div class="pmi-label">Type</div><div class="pmi-val">'+escH(p.type)+'</div></div>':'')
        +(p.location?'<div class="pmi"><div class="pmi-label">Location</div><div class="pmi-val">'+escH(p.location)+'</div></div>':'')
      +'</div>'
      +'<div class="proj-divider"></div>'
      +'<div class="proj-modules">'+MODS.map(function(m){return'<span class="mod-chip">'+m+'</span>';}).join('')+'</div>'
      +'</div>';
  }).join('')+'</div>';
  // Attach click handlers after rendering
  f.forEach(function(p){
    var card=document.getElementById('pc-'+p.id);
    if(card){
      card.addEventListener('click',function(){openProject(p.id);});
    }
  });
}

function openProject(id){
  var p=projects.find(function(x){return x.id===id;});if(!p)return;
  localStorage.setItem('hvacnexus_current_project',JSON.stringify({id:p.id,num:p.num,name:p.name}));
  window.location.href='project.html?id='+p.id;
}

function openCreateModal(){
  _editingId=null;
  document.getElementById('modalTitle').textContent='Create Project';
  document.getElementById('modalSub').textContent='Add a new project to HVAC NEXUS';
  document.getElementById('saveBtn').textContent='Create Project';
  ['f-num','f-name','f-client','f-value','f-location','f-desc'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('f-status').value='Active';
  document.getElementById('f-type').value='Commercial';
  document.getElementById('f-start').value='';
  document.getElementById('f-end').value='';
  document.getElementById('projectModal').classList.add('open');
  setTimeout(function(){document.getElementById('f-num').focus();},80);
}
function openEditModal(id){
  var p=projects.find(function(x){return x.id===id;});if(!p)return;
  _editingId=id;
  document.getElementById('modalTitle').textContent='Edit Project';
  document.getElementById('modalSub').textContent=p.num+' — '+p.name;
  document.getElementById('saveBtn').textContent='Save Changes';
  document.getElementById('f-num').value=p.num||'';
  document.getElementById('f-name').value=p.name||'';
  document.getElementById('f-client').value=p.client||'';
  document.getElementById('f-value').value=p.value||'';
  document.getElementById('f-location').value=p.location||'';
  document.getElementById('f-desc').value=p.desc||'';
  document.getElementById('f-status').value=p.status||'Active';
  document.getElementById('f-type').value=p.type||'Commercial';
  document.getElementById('f-start').value=p.start||'';
  document.getElementById('f-end').value=p.end||'';
  document.getElementById('projectModal').classList.add('open');
}
function closeModal(){document.getElementById('projectModal').classList.remove('open');_editingId=null;}

function saveProject(){
  var num=document.getElementById('f-num').value.trim();
  var name=document.getElementById('f-name').value.trim();
  if(!num){alert('Project Number is required.');document.getElementById('f-num').focus();return;}
  if(!name){alert('Project Name is required.');document.getElementById('f-name').focus();return;}
  var today=new Date().toISOString().split('T')[0];
  var data={num:num,name:name,
    client:document.getElementById('f-client').value.trim(),
    value:document.getElementById('f-value').value.trim(),
    location:document.getElementById('f-location').value.trim(),
    desc:document.getElementById('f-desc').value.trim(),
    status:document.getElementById('f-status').value,
    type:document.getElementById('f-type').value,
    start:document.getElementById('f-start').value,
    end:document.getElementById('f-end').value};
  if(_editingId){
    var p=projects.find(function(x){return x.id===_editingId;});
    if(p)Object.assign(p,data);
  } else {
    data.id=nid();data.created=today;
    projects.push(data);
  }
  save();closeModal();renderProjects();
}
function deleteProject(id){
  var p=projects.find(function(x){return x.id===id;});if(!p)return;
  if(!confirm('Delete "'+p.name+'"? This cannot be undone.'))return;
  projects=projects.filter(function(x){return x.id!==id;});
  save();renderProjects();
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

load();seedIfEmpty();renderProjects();
</script>
</body>
</html>
